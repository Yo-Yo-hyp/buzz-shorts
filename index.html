<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --bg:#0B0E11;
    --surface:#161B22;
    --text:#F5F3EE;
    --text-dim:#8A8F98;
    --spike:#D4FF3D;
    --hot:#FF5C3D;
    --font-display:'Space Mono', monospace;
    --font-body:'Noto Sans JP', sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  body{
    background-image:
      radial-gradient(circle at 15% 10%, rgba(212,255,61,0.05), transparent 35%),
      radial-gradient(circle at 85% 90%, rgba(255,92,61,0.05), transparent 35%);
  }
  button{font-family:inherit;}

  /* ===== Top bar ===== */
  .topbar{
    position:fixed;
    top:0;left:0;right:0;
    z-index:50;
    display:flex;
    flex-direction:column;
    gap:8px;
    padding:max(10px, env(safe-area-inset-top)) 14px 12px;
    background:linear-gradient(to bottom, rgba(11,14,17,0.94) 60%, rgba(11,14,17,0));
    pointer-events:none;
  }
  .topbar > *{pointer-events:auto;}

  .topbar-row{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .logo{
    font-family:var(--font-display);
    font-weight:700;
    font-size:13px;
    letter-spacing:0.06em;
    flex-shrink:0;
    white-space:nowrap;
  }
  .logo .accent{color:var(--spike);}

  .topbar-spacer{flex:1;}

  /* 丸ピル型のアイコンボタン共通 */
  .icon-btn{
    font-family:var(--font-display);
    font-size:12px;
    letter-spacing:0.04em;
    padding:6px 11px;
    border:1px solid rgba(245,243,238,0.18);
    border-radius:999px;
    background:rgba(11,14,17,0.4);
    color:var(--text);
    cursor:pointer;
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:5px;
    line-height:1;
  }
  .icon-btn.streak{
    color:var(--hot);
    border-color:rgba(255,92,61,0.35);
    font-weight:700;
  }
  .icon-btn.autoplay-on{
    color:var(--bg);
    background:var(--spike);
    border-color:var(--spike);
    font-weight:700;
  }

  .genre-tabs{
    display:flex;
    gap:6px;
    overflow-x:auto;
    flex:1;
    scrollbar-width:none;
    -ms-overflow-style:none;
  }
  .genre-tabs::-webkit-scrollbar{display:none;}
  .genre-tab{
    font-family:var(--font-display);
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    padding:6px 12px;
    border:1px solid rgba(245,243,238,0.18);
    border-radius:999px;
    color:var(--text-dim);
    white-space:nowrap;
    cursor:pointer;
    background:rgba(11,14,17,0.4);
    transition:background .15s, color .15s, border-color .15s;
    flex-shrink:0;
  }
  .genre-tab.active{
    color:var(--bg);
    background:var(--spike);
    border-color:var(--spike);
    font-weight:700;
  }
  .genre-tab.special.active{
    background:var(--hot);
    border-color:var(--hot);
  }

  /* ===== Feed ===== */
  .feed{
    height:100vh;
    height:100dvh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scrollbar-width:none;
  }
  .feed::-webkit-scrollbar{display:none;}

  .card{
    height:100vh;
    height:100dvh;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  .card-inner{
    position:relative;
    width:100%;
    height:100%;
    max-width:480px;
    margin:0 auto;
    background:#000;
    overflow:hidden;
  }
  @media (min-width:560px){
    .card-inner{
      height:calc(100% - 32px);
      margin:16px auto;
      border-radius:22px;
      box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);
    }
  }

  .media{position:absolute;inset:0;background:#000;}
  .media img{
    width:100%;height:100%;object-fit:cover;
    filter:brightness(0.92);
  }
  .media iframe{
    width:100%;height:100%;border:0;
    object-fit:cover;
    pointer-events:none; /* controlsを消してるので、操作はtap-layerに任せる */
  }
  .tap-layer{
    position:absolute;inset:0;
    z-index:3;
    background:transparent;
  }

  .play-hint{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .play-hint svg{
    width:54px;height:54px;
    opacity:0.85;
    filter:drop-shadow(0 4px 16px rgba(0,0,0,0.5));
  }

  /* ===== Floating round buttons on the card ===== */
  .round-btn{
    position:absolute;
    top:max(96px, calc(env(safe-area-inset-top) + 88px));
    width:38px;height:38px;
    border-radius:50%;
    background:rgba(11,14,17,0.55);
    border:1px solid rgba(245,243,238,0.18);
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    z-index:10;
    backdrop-filter:blur(4px);
  }
  .round-btn svg{width:18px;height:18px;}
  .sound-toggle{right:14px;}
  .clip-toggle{left:14px;}
  .clip-toggle.active{
    color:var(--spike);
    border-color:rgba(212,255,61,0.5);
  }

  /* ===== Autoplay progress bar ===== */
  .autoplay-progress{
    position:absolute;
    top:0;left:0;right:0;
    height:3px;
    background:rgba(245,243,238,0.12);
    z-index:4;
  }
  .autoplay-progress .fill{
    height:100%;
    width:0%;
    background:var(--spike);
    transition:width .2s linear;
  }

  /* ===== Overlay info ===== */
  .overlay{
    position:absolute;
    left:0;right:0;bottom:0;
    padding:18px 16px max(18px, env(safe-area-inset-bottom)) 16px;
    background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.55) 45%, transparent 100%);
    display:flex;
    align-items:flex-end;
    gap:12px;
    z-index:8;
  }
  .overlay-main{flex:1;min-width:0;}

  .eyebrow{
    font-family:var(--font-display);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--spike);
    display:flex;
    align-items:center;
    gap:6px;
    margin-bottom:8px;
    font-weight:700;
  }
  .eyebrow.hot{color:var(--hot);}
  .eyebrow .dot{
    width:6px;height:6px;border-radius:50%;
    background:currentColor;
    animation:blink 1s ease-in-out infinite;
  }

  .genre-pill{
    font-family:var(--font-display);
    font-size:10px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-dim);
    border:1px solid rgba(245,243,238,0.18);
    border-radius:999px;
    padding:2px 8px;
    margin-bottom:8px;
    display:inline-block;
  }

  .channel{
    font-size:12.5px;
    color:var(--text-dim);
    margin-bottom:4px;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
  }
  .title{
    font-size:15px;
    font-weight:700;
    line-height:1.45;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .stats{
    font-family:var(--font-display);
    font-size:11px;
    color:var(--text-dim);
    margin-top:8px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }

  /* ===== Spike meter ===== */
  .spike-meter{
    display:flex;
    align-items:flex-end;
    gap:3px;
    height:46px;
    flex-shrink:0;
    padding-bottom:4px;
  }
  .spike-meter .bar{
    width:5px;
    border-radius:3px;
    background:var(--spike);
    transform-origin:bottom;
    animation:pulse ease-in-out infinite;
  }
  .spike-meter.hot .bar{background:var(--hot);}

  @keyframes pulse{
    0%,100%{transform:scaleY(0.25);}
    50%{transform:scaleY(1);}
  }
  @keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0.25;}
  }

  /* ===== Status screens ===== */
  .status{
    position:fixed;inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    text-align:center;
    padding:24px;
    z-index:100;
  }
  .status.hidden{display:none;}
  .status .big{
    font-family:var(--font-display);
    font-size:14px;
    letter-spacing:0.1em;
    color:var(--spike);
  }
  .status p{
    color:var(--text-dim);
    font-size:13px;
    max-width:320px;
    line-height:1.7;
  }
  .spinner{
    width:28px;height:28px;
    border:2px solid rgba(212,255,61,0.25);
    border-top-color:var(--spike);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .updated{
    position:fixed;
    bottom:max(10px, env(safe-area-inset-bottom));
    left:14px;
    font-family:var(--font-display);
    font-size:10px;
    color:rgba(245,243,238,0.35);
    z-index:40;
    pointer-events:none;
  }

  /* ===== Toast ===== */
  .toast{
    position:fixed;
    top:max(64px, calc(env(safe-area-inset-top) + 56px));
    left:50%;
    transform:translateX(-50%) translateY(-8px);
    background:var(--surface);
    border:1px solid rgba(212,255,61,0.4);
    color:var(--text);
    font-size:12.5px;
    font-family:var(--font-display);
    padding:10px 18px;
    border-radius:999px;
    z-index:150;
    box-shadow:0 10px 30px -10px rgba(0,0,0,0.6);
    opacity:0;
    transition:opacity .3s, transform .3s;
    pointer-events:none;
    white-space:nowrap;
    max-width:90vw;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  /* ===== Predict block (on video cards) ===== */
  .predict-block{
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid rgba(245,243,238,0.14);
  }
  .predict-countdown{
    font-family:var(--font-display);
    font-size:10.5px;
    color:var(--text-dim);
    margin-bottom:8px;
    letter-spacing:0.04em;
  }
  .predict-countdown.urgent{color:var(--hot);}
  .predict-tier-row{
    display:flex;
    gap:6px;
    margin-bottom:8px;
  }
  .predict-tier-btn{
    flex:1;
    background:rgba(11,14,17,0.55);
    border:1px solid rgba(245,243,238,0.2);
    color:var(--text);
    font-size:11.5px;
    font-weight:700;
    padding:8px 4px;
    border-radius:10px;
    cursor:pointer;
    text-align:center;
    line-height:1.3;
  }
  .predict-tier-btn:active{transform:scale(0.96);}
  .predict-confidence-row{
    display:flex;
    gap:6px;
  }
  .predict-confidence-btn{
    flex:1;
    background:transparent;
    border:1px solid rgba(245,243,238,0.16);
    color:var(--text-dim);
    font-size:10.5px;
    padding:5px 4px;
    border-radius:999px;
    cursor:pointer;
    text-align:center;
  }
  .predict-confidence-btn.active{
    color:var(--bg);
    background:var(--spike);
    border-color:var(--spike);
    font-weight:700;
  }
  .predict-waiting{
    font-size:12px;
    color:var(--text-dim);
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .predict-waiting .my-pick{
    color:var(--text);
    font-weight:700;
  }
  .predict-result{
    font-size:12.5px;
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .predict-result .hit{color:var(--spike);font-weight:700;}
  .predict-result .miss{color:var(--hot);font-weight:700;}
  .predict-share-btn{
    background:transparent;
    border:1px solid rgba(245,243,238,0.24);
    color:var(--text);
    font-size:11px;
    padding:5px 10px;
    border-radius:999px;
    cursor:pointer;
  }

  /* ===== Predict dashboard / history (予想タブ) ===== */
  .predict-dash{
    width:100%;
    height:100%;
    max-width:480px;
    overflow-y:auto;
    padding:max(96px, calc(env(safe-area-inset-top) + 88px)) 18px 40px;
  }
  .predict-dash h2{
    font-family:var(--font-display);
    font-size:15px;
    margin-bottom:14px;
  }
  .predict-stat-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:18px;
  }
  .predict-stat{
    background:var(--surface);
    border:1px solid rgba(245,243,238,0.1);
    border-radius:12px;
    padding:12px 8px;
    text-align:center;
  }
  .predict-stat .num{
    font-family:var(--font-display);
    font-size:20px;
    color:var(--spike);
    display:block;
  }
  .predict-stat .label{
    font-size:10.5px;
    color:var(--text-dim);
    margin-top:2px;
  }
  .predict-badges{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:18px;
  }
  .predict-badge-pill{
    font-size:11px;
    background:var(--surface);
    border:1px solid rgba(212,255,61,0.3);
    color:var(--spike);
    padding:4px 10px;
    border-radius:999px;
  }
  .predict-history-item{
    display:flex;
    gap:10px;
    padding:10px 0;
    border-bottom:1px solid rgba(245,243,238,0.08);
  }
  .predict-history-item img{
    width:64px;height:64px;
    object-fit:cover;
    border-radius:8px;
    flex-shrink:0;
    background:var(--surface);
  }
  .predict-history-item .info{min-width:0;flex:1;}
  .predict-history-item .title{
    font-size:12.5px;
    line-height:1.4;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    margin-bottom:4px;
  }
  .predict-history-item .meta{
    font-size:11px;
    color:var(--text-dim);
  }

  /* ===== Modal (genre settings) ===== */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(11,14,17,0.78);
    backdrop-filter:blur(4px);
    z-index:200;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .modal-overlay.hidden{display:none;}
  .modal{
    background:var(--surface);
    border:1px solid rgba(245,243,238,0.1);
    border-radius:20px;
    padding:24px;
    max-width:380px;
    width:100%;
    max-height:80vh;
    overflow-y:auto;
  }
  .modal h2{
    font-family:var(--font-display);
    font-size:14px;
    letter-spacing:0.06em;
    color:var(--spike);
    margin-bottom:8px;
  }
  .modal p{
    font-size:12.5px;
    color:var(--text-dim);
    line-height:1.7;
    margin-bottom:18px;
  }
  .pill-grid{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:22px;
  }
  .pill-choice{
    font-family:var(--font-display);
    font-size:11px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:8px 14px;
    border-radius:999px;
    border:1px solid rgba(245,243,238,0.18);
    background:rgba(11,14,17,0.4);
    color:var(--text-dim);
    cursor:pointer;
  }
  .pill-choice.selected{
    background:var(--spike);
    border-color:var(--spike);
    color:var(--bg);
    font-weight:700;
  }
  .modal-actions{
    display:flex;
    gap:10px;
  }
  .modal-actions button{
    flex:1;
    font-family:var(--font-display);
    font-size:12px;
    letter-spacing:0.05em;
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(245,243,238,0.18);
    background:transparent;
    color:var(--text);
    cursor:pointer;
  }
  .modal-actions .primary{
    background:var(--spike);
    border-color:var(--spike);
    color:var(--bg);
    font-weight:700;
  }
</style>
</head>
<body>

  <!--
    検索エンジン・JS非対応環境向けの初期コンテンツ。
    JSが実行されるとフィードに置き換わるため、通常の利用では見えない。
  -->
  <noscript>
    <div style="padding:32px; max-width:640px; margin:0 auto; line-height:1.8;">
      <h1>BUZZ SHORTS — 今、跳ねているYouTube Shortsだけを観測する</h1>
      <p>
        登録者数に対して再生数が異常に伸びているYouTube Shortsだけを、毎日自動で集めて紹介しているサイトです。
        ゲーム・料理・ペット・コメディ・美容・音楽・スポーツ・雑談など、ジャンルごとに「今バズっている動画」を見つけられます。
      </p>
      <p>このサイトの表示にはJavaScriptが必要です。ブラウザの設定でJavaScriptを有効にしてください。</p>
    </div>
  </noscript>

  <div class="topbar">
    <div class="topbar-row">
      <div class="logo"><span class="accent">⚡</span>BUZZ<span class="accent">SHORTS</span></div>
      <button class="icon-btn streak" id="streakBadge" type="button">🔥 0</button>
      <div class="topbar-spacer"></div>
      <button class="icon-btn" id="autoplayBtn" type="button">▶▶</button>
      <button class="icon-btn" id="sortBtn" type="button">⚡</button>
      <button class="icon-btn" id="settingsBtn" type="button">⚙</button>
      <button class="icon-btn" id="langToggle" type="button">EN</button>
    </div>
    <div class="topbar-row">
      <nav class="genre-tabs" id="genreTabs"></nav>
    </div>
  </div>

  <main class="feed" id="feed"></main>

  <div class="status" id="loadingStatus">
    <div class="spinner"></div>
    <div class="big" id="loadingLabel">LOADING SIGNAL...</div>
  </div>

  <div class="status hidden" id="emptyStatus">
    <div class="big">NO SIGNAL</div>
    <p id="emptyLabel"></p>
  </div>

  <div class="updated" id="updatedAt"></div>
  <div class="toast" id="toast"></div>

  <div class="modal-overlay hidden" id="genreModal">
    <div class="modal">
      <h2 id="modalTitle">GENRE SETTINGS</h2>
      <p id="modalDesc"></p>

        <button id="modalSkip"></button>

      </div>

  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
  /* =========================================================
     BUZZ SHORTS
     登録者数に対して再生数が異常に伸びているShortsだけを
     縦スクロールフィードで表示するサイト本体
     ========================================================= */

  // ---- ジャンル一覧 -------------------------------------------
  const GENRES = [
    {id:'all',     ja:'すべて',     en:'All'},
    {id:'game',    ja:'ゲーム',     en:'Gaming'},
    {id:'cooking', ja:'料理',       en:'Cooking'},
    {id:'pets',    ja:'ペット',     en:'Pets'},
    {id:'comedy',  ja:'コメディ',   en:'Comedy'},
    {id:'beauty',  ja:'美容',       en:'Beauty'},
    {id:'music',   ja:'音楽',       en:'Music'},
    {id:'sports',  ja:'スポーツ',   en:'Sports'},
    {id:'talk',    ja:'雑談',       en:'Talk'},
    {id:'other',   ja:'その他',     en:'Other'},
  ];

  // 並び替えモード
  const SORT_MODES = ['spike', 'new', 'views'];
  const SORT_ICON = {spike:'⚡', new:'🆕', views:'👁'};

  // 観測ストリークの称号テーブル（しきい値: 称号）
  const STREAK_TIERS = {
    ja: [[1,'観測員見習い'],[3,'観測員'],[7,'観測員 Lv.2'],[14,'主任観測員'],[30,'伝説の観測員']],
    en: [[1,'Trainee Observer'],[3,'Observer'],[7,'Observer Lv.2'],[14,'Senior Observer'],[30,'Legendary Observer']],
  };

  // ---- 予想ゲーム関連 -------------------------------------------
  // 6時間後の伸び方の3段階
  const PREDICT_TIERS = [
    {id:'blast',  ja:'🔥爆伸び',   en:'🔥Blast',  short:{ja:'爆伸び', en:'Blast'}},
    {id:'normal', ja:'📈普通',     en:'📈Normal', short:{ja:'普通',   en:'Normal'}},
    {id:'slow',   ja:'😐伸び悩み', en:'😐Slow',   short:{ja:'伸び悩み', en:'Slow'}},
  ];
  // 自信度（当たったときのポイント倍率）
  const CONFIDENCE_LEVELS = [
    {id:'weak',   mult:0.5, ja:'弱気', en:'Cautious'},
    {id:'normal', mult:1,   ja:'普通', en:'Normal'},
    {id:'strong', mult:2,   ja:'強気', en:'Bold'},
  ];
  // 予想的中の連続記録に応じた称号
  const PREDICT_BADGE_TIERS = {
    ja: [[3,'予想見習い'],[7,'予言者の卵'],[15,'的中ハンター'],[30,'伝説の予言者']],
    en: [[3,'Rookie Forecaster'],[7,'Rising Prophet'],[15,'Hit Hunter'],[30,'Legendary Prophet']],
  };

  const I18N = {
    ja: {
      loading: '信号を観測中...',
      empty: 'このジャンルでは、今のところ急上昇している動画が見つかりませんでした。',
      clipsEmpty: '保存した動画はまだないよ。🔖アイコンで気になる動画をクリップしてみよう。',
      heroLabel: '本日最大の急上昇',
      spike: (n) => `通常の ${n}倍 再生中`,
      hoursAgo: (h) => h < 1 ? 'たった今' : `${h}時間前`,
      views: (n) => `${n} 回視聴`,
      subs: (n) => `登録者 ${n}人`,
      updated: (s) => `最終更新: ${s}`,
      langBtn: 'EN',
      myFeed: '📌 マイフィード',
      clips: '🔖 クリップ',
      sortNames: {spike:'急上昇順', new:'新着順', views:'再生数順'},
      modalTitle: '好きなジャンルを選んでね',
      modalDesc: '選んだジャンルをまとめて見られる「マイフィード」を作るよ。あとで⚙アイコンから変更できます。',
      modalSave: '保存してマイフィードを作る',
      modalSkip: 'あとで設定する',
      streakToast: (n, title) => `🔥 ${n}日連続観測中！「${title}」になったよ`,
      autoplayOn: '🔁 自動送りON',
      autoplayOff: '⏸ 自動送りOFF',
      predictTab: '🎯 予想',
      predictCountdown: (h, m) => h > 0 ? `答え合わせまで あと${h}時間${m}分` : `答え合わせまで あと${m}分`,
      predictCountdownDone: '答え合わせ待ち…',
      predictMade: (tier) => `予想済み：${tier}`,
      predictHit: '🎯 的中！',
      predictMiss: '✗ ハズレ',
      predictActual: (r) => `実際の伸び：${r}倍`,
      predictShare: '結果をシェア',
      predictResultToast: (hit, title) => hit ? `🎯 的中！「${title}」の予想当たったよ` : `「${title}」の予想はハズレ…次いこ`,
      predictBadgeToast: (title) => `🏅 称号「${title}」を獲得したよ`,
      predictDashTitle: '予想ダッシュボード',
      predictStatStreak: '連続的中',
      predictStatBest: '最高記録',
      predictStatRate: '的中率',
      predictHistoryEmpty: 'まだ予想してないよ。動画カードの下から「爆伸び／普通／伸び悩み」を選んで予想してみよう。',
      predictPending: '答え合わせ待ち',
    },
    en: {
      loading: 'Scanning for spikes...',
      empty: 'No spiking videos found in this genre right now.',
      clipsEmpty: 'No saved videos yet. Tap the 🔖 icon to save ones you like.',
      heroLabel: "Today's biggest spike",
      spike: (n) => `${n}x normal views`,
      hoursAgo: (h) => h < 1 ? 'just now' : `${h}h ago`,
      views: (n) => `${n} views`,
      subs: (n) => `${n} subs`,
      updated: (s) => `Last updated: ${s}`,
      langBtn: 'JP',
      myFeed: '📌 My Feed',
      clips: '🔖 Saved',
      sortNames: {spike:'Spike', new:'New', views:'Views'},
      modalTitle: 'Pick your favorite genres',
      modalDesc: 'We\'ll build a "My Feed" that combines the genres you pick. You can change this anytime from the ⚙ icon.',
      modalSave: 'Save & build My Feed',
      modalSkip: 'Maybe later',
      streakToast: (n, title) => `🔥 ${n}-day streak! You're now "${title}"`,
      autoplayOn: '🔁 Autoplay ON',
      autoplayOff: '⏸ Autoplay OFF',
      predictTab: '🎯 Predict',
      predictCountdown: (h, m) => h > 0 ? `Result in ${h}h ${m}m` : `Result in ${m}m`,
      predictCountdownDone: 'Awaiting result…',
      predictMade: (tier) => `Your pick: ${tier}`,
      predictHit: '🎯 Hit!',
      predictMiss: '✗ Miss',
      predictActual: (r) => `Actual growth: ${r}x`,
      predictShare: 'Share result',
      predictResultToast: (hit, title) => hit ? `🎯 Hit! Your pick on "${title}" was right` : `Your pick on "${title}" missed... next one`,
      predictBadgeToast: (title) => `🏅 Earned the "${title}" badge`,
      predictDashTitle: 'Predict Dashboard',
      predictStatStreak: 'Hit Streak',
      predictStatBest: 'Best Streak',
      predictStatRate: 'Hit Rate',
      predictHistoryEmpty: "No predictions yet. Pick Blast / Normal / Slow under any video card to get started.",
      predictPending: 'Awaiting result',
    }
  };

  // ---- state -------------------------------------------------
  let LANG = localStorage.getItem('buzzshorts_lang') || (navigator.language?.startsWith('ja') ? 'ja' : 'en');
  let MUTED = localStorage.getItem('buzzshorts_muted') !== 'false'; // デフォルトはミュート
  let currentGenre = 'all';
  let allVideos = [];
  let ytReady = false;
  let activePlayer = null;
  let activeCardId = null;
  let pendingActivate = null;

  let sortMode = localStorage.getItem('buzzshorts_sort') || 'spike';
  if(!SORT_MODES.includes(sortMode)) sortMode = 'spike';

  let autoplayChain = localStorage.getItem('buzzshorts_autoplay') !== 'false'; // デフォルトON
  let progressTimer = null;

  let favoriteGenres = [];
  try{ favoriteGenres = JSON.parse(localStorage.getItem('buzzshorts_favorites') || '[]'); }catch(e){ favoriteGenres = []; }

  let clips = [];
  try{ clips = JSON.parse(localStorage.getItem('buzzshorts_clips') || '[]'); }catch(e){ clips = []; }

  // ---- 予想ゲーム state ------------------------------------------
  // predictions: { [videoId]: {tier, confidence, predictedAt, judged, hit, resolvedTier, sixHourGrowthRatio} }
  let predictions = {};
  try{ predictions = JSON.parse(localStorage.getItem('buzzshorts_predictions') || '{}'); }catch(e){ predictions = {}; }

  // predictStats: { streak, bestStreak, totalHit, totalJudged, genreStats:{genre:{hit,total}}, badges:[id,...] }
  let predictStats = {streak:0, bestStreak:0, totalHit:0, totalJudged:0, genreStats:{}, badges:[]};
  try{
    const saved = JSON.parse(localStorage.getItem('buzzshorts_predict_stats') || 'null');
    if(saved) predictStats = Object.assign(predictStats, saved);
  }catch(e){ /* keep defaults */ }

  function savePredictions(){
    localStorage.setItem('buzzshorts_predictions', JSON.stringify(predictions));
  }
  function savePredictStats(){
    localStorage.setItem('buzzshorts_predict_stats', JSON.stringify(predictStats));
  }

  let modalPillSelection = new Set(favoriteGenres);

  const feedEl = document.getElementById('feed');
  const tabsEl = document.getElementById('genreTabs');
  const langBtn = document.getElementById('langToggle');
  const sortBtn = document.getElementById('sortBtn');
  const autoplayBtn = document.getElementById('autoplayBtn');
  const settingsBtn = document.getElementById('settingsBtn');
  const streakBadge = document.getElementById('streakBadge');
  const loadingStatus = document.getElementById('loadingStatus');
  const loadingLabel = document.getElementById('loadingLabel');
  const emptyStatus = document.getElementById('emptyStatus');
  const emptyLabel = document.getElementById('emptyLabel');
  const updatedAtEl = document.getElementById('updatedAt');
  const toastEl = document.getElementById('toast');

  const genreModal = document.getElementById('genreModal');
  const modalTitleEl = document.getElementById('modalTitle');
  const modalDescEl = document.getElementById('modalDesc');
  const modalPillsEl = document.getElementById('modalPills');
  const modalSaveBtn = document.getElementById('modalSave');
  const modalSkipBtn = document.getElementById('modalSkip');

  function t(key, ...args){
    const fn = I18N[LANG][key];
    return typeof fn === 'function' ? fn(...args) : fn;
  }

  function formatNumber(n){
    n = Number(n) || 0;
    if(LANG === 'ja'){
      if(n >= 100000000) return (n/100000000).toFixed(1).replace(/\.0$/,'') + '億';
      if(n >= 10000) return (n/10000).toFixed(1).replace(/\.0$/,'') + '万';
      return n.toLocaleString('ja-JP');
    }
    if(n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
    if(n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
    return n.toLocaleString('en-US');
  }

  function hoursAgo(iso){
    const diff = Date.now() - new Date(iso).getTime();
    return Math.max(0, Math.floor(diff / 3600000));
  }

  // ---- toast ----------------------------------------------------
  let toastTimer = null;
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 4000);
  }

  // ---- 観測ストリーク ---------------------------------------------
  function streakTitleFor(count){
    const tiers = STREAK_TIERS[LANG];
    let title = tiers[0][1];
    for(const [threshold, label] of tiers){
      if(count >= threshold) title = label;
    }
    return title;
  }

  function updateStreak(){
    const todayStr = new Date().toDateString();
    const lastVisit = localStorage.getItem('buzzshorts_last_visit');
    let streak = Number(localStorage.getItem('buzzshorts_streak') || '0');
    let increased = false;

    if(lastVisit !== todayStr){
      if(lastVisit){
        const diffDays = Math.round((new Date(todayStr) - new Date(lastVisit)) / 86400000);
        streak = diffDays === 1 ? streak + 1 : 1;
      } else {
        streak = 1;
      }
      increased = true;
      localStorage.setItem('buzzshorts_last_visit', todayStr);
      localStorage.setItem('buzzshorts_streak', String(streak));
    }

    streakBadge.textContent = `🔥 ${streak}`;
    if(increased){
      showToast(t('streakToast', streak, streakTitleFor(streak)));
    }
  }

  // ---- クリップ（あとで見る） --------------------------------------
  function isClipped(id){
    return clips.some(c => c.id === id);
  }
  function toggleClip(video){
    const idx = clips.findIndex(c => c.id === video.id);
    if(idx >= 0){
      clips.splice(idx, 1);
    } else {
      clips.unshift({...video, savedAt: Date.now()});
    }
    localStorage.setItem('buzzshorts_clips', JSON.stringify(clips));
    if(currentGenre === 'clips'){
      renderFeed();
    }
  }

  // ---- 予想ゲーム ロジック -----------------------------------------
  function tierLabel(tierId, short){
    const tier = PREDICT_TIERS.find(t => t.id === tierId);
    if(!tier) return tierId;
    return short ? tier.short[LANG] : tier[LANG];
  }

  function predictTargetTime(video){
    const hours = video.predictCheckHours || 6;
    return new Date(video.firstSeenAt || video.publishedAt).getTime() + hours * 3600000;
  }

  function formatCountdown(video){
    const remainMs = predictTargetTime(video) - Date.now();
    if(remainMs <= 0) return t('predictCountdownDone');
    const totalMin = Math.floor(remainMs / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return t('predictCountdown', h, m);
  }

  function submitPrediction(video, tier, confidence){
    if(predictions[video.id] || video.resolvedTier) return; // 予想済み or 既に答えが出てるものは不可
    predictions[video.id] = {
      tier, confidence,
      predictedAt: Date.now(),
      genre: video.genre,
      videoTitle: video.title,
      thumbnail: video.thumbnail,
      judged: false,
      hit: null,
      resolvedTier: null,
      sixHourGrowthRatio: null,
    };
    savePredictions();
  }

  // アプリ起動時に、答え合わせが済んだ動画に対する未判定の予想を採点する
  function checkResolutions(){
    const videoMap = new Map(allVideos.map(v => [v.id, v]));
    let anyNewBadge = null;
    let lastResultToast = null;

    Object.entries(predictions).forEach(([id, p]) => {
      if(p.judged) return;
      const video = videoMap.get(id);
      if(!video || !video.resolvedTier) return; // まだ答えが出てない

      const hit = p.tier === video.resolvedTier;
      p.judged = true;
      p.hit = hit;
      p.resolvedTier = video.resolvedTier;
      p.sixHourGrowthRatio = video.sixHourGrowthRatio;

      predictStats.totalJudged++;
      const g = p.genre || 'other';
      if(!predictStats.genreStats[g]) predictStats.genreStats[g] = {hit:0, total:0};
      predictStats.genreStats[g].total++;

      if(hit){
        predictStats.totalHit++;
        predictStats.streak++;
        predictStats.genreStats[g].hit++;
        if(predictStats.streak > predictStats.bestStreak) predictStats.bestStreak = predictStats.streak;

        const tiers = PREDICT_BADGE_TIERS[LANG];
        for(const [threshold, badgeName] of tiers){
          if(predictStats.streak >= threshold && !predictStats.badges.includes(badgeName)){
            predictStats.badges.push(badgeName);
            anyNewBadge = badgeName;
          }
        }
      } else {
        predictStats.streak = 0;
      }

      lastResultToast = {hit, title: p.videoTitle};
    });

    savePredictions();
    savePredictStats();

    // トーストはうるさくなりすぎないよう、直近1件だけ通知する
    if(lastResultToast){
      showToast(t('predictResultToast', lastResultToast.hit, lastResultToast.title.slice(0, 24)));
    }
    if(anyNewBadge){
      setTimeout(() => showToast(t('predictBadgeToast', anyNewBadge)), 4200);
    }
  }

  // ---- 予想ブロック（動画カード用） ---------------------------------
  function buildPredictBlock(video){
    const wrap = document.createElement('div');
    wrap.className = 'predict-block';
    const existing = predictions[video.id];

    if(existing && existing.judged){
      wrap.innerHTML = `
        <div class="predict-result">
          <span class="${existing.hit ? 'hit' : 'miss'}">${existing.hit ? t('predictHit') : t('predictMiss')}</span>
          <span>${t('predictActual', existing.sixHourGrowthRatio ?? '—')}</span>
          <button class="predict-share-btn" type="button">${t('predictShare')}</button>
        </div>
      `;
      wrap.querySelector('.predict-share-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        shareResultCard(video, existing);
      });
      return wrap;
    }

    if(existing && !existing.judged){
      wrap.innerHTML = `
        <div class="predict-countdown" data-video-id="${video.id}">${formatCountdown(video)}</div>
        <div class="predict-waiting">${t('predictMade', tierLabel(existing.tier, true))}</div>
      `;
      return wrap;
    }

    if(video.resolvedTier){
      // 予想しないまま答えが出てしまった動画（もう予想は受け付けない）
      wrap.innerHTML = `
        <div class="predict-waiting">${t('predictActual', video.sixHourGrowthRatio ?? '—')}</div>
      `;
      return wrap;
    }

    wrap.innerHTML = `
      <div class="predict-countdown" data-video-id="${video.id}">${formatCountdown(video)}</div>
      <div class="predict-tier-row">
        ${PREDICT_TIERS.map(tr => `<button class="predict-tier-btn" data-tier="${tr.id}" type="button">${tr[LANG]}</button>`).join('')}
      </div>
      <div class="predict-confidence-row">
        ${CONFIDENCE_LEVELS.map(c => `<button class="predict-confidence-btn${c.id==='normal' ? ' active' : ''}" data-confidence="${c.id}" type="button">${c[LANG]}</button>`).join('')}
      </div>
    `;

    let selectedConfidence = 'normal';
    wrap.querySelectorAll('.predict-confidence-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        selectedConfidence = btn.dataset.confidence;
        wrap.querySelectorAll('.predict-confidence-btn').forEach(b => b.classList.toggle('active', b === btn));
      });
    });
    wrap.querySelectorAll('.predict-tier-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        submitPrediction(video, btn.dataset.tier, selectedConfidence);
        const card = wrap.closest('.card');
        if(card){
          const fresh = buildPredictBlock(video);
          wrap.replaceWith(fresh);
        }
      });
    });

    return wrap;
  }

  // ---- 結果シェアカード（Canvas生成） --------------------------------
  function shareResultCard(video, prediction){
    const canvas = document.createElement('canvas');
    canvas.width = 1080; canvas.height = 1080;
    const ctx = canvas.getContext('2d');

    const grad = ctx.createLinearGradient(0, 0, 1080, 1080);
    grad.addColorStop(0, '#0B0E11');
    grad.addColorStop(1, '#161B22');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1080, 1080);

    ctx.fillStyle = prediction.hit ? '#D4FF3D' : '#FF5C3D';
    ctx.font = '700 64px "Space Mono", monospace';
    ctx.fillText(prediction.hit ? (LANG==='ja' ? '的中！' : 'HIT!') : (LANG==='ja' ? 'ハズレ' : 'MISS'), 64, 160);

    ctx.fillStyle = '#8A8F98';
    ctx.font = '400 28px "Noto Sans JP", sans-serif';
    ctx.fillText('BUZZ SHORTS', 64, 220);

    ctx.fillStyle = '#F5F3EE';
    ctx.font = '700 40px "Noto Sans JP", sans-serif';
    wrapText(ctx, video.title, 64, 340, 950, 52);

    ctx.fillStyle = '#F5F3EE';
    ctx.font = '400 32px "Noto Sans JP", sans-serif';
    const predictLine = LANG==='ja'
      ? `予想: ${tierLabel(prediction.tier)}`
      : `Pick: ${tierLabel(prediction.tier)}`;
    const actualLine = t('predictActual', prediction.sixHourGrowthRatio ?? '—');
    ctx.fillText(predictLine, 64, 640);
    ctx.fillText(actualLine, 64, 690);

    canvas.toBlob(async (blob) => {
      const file = new File([blob], 'buzzshorts-result.png', {type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        try{
          await navigator.share({files:[file], title:'BUZZ SHORTS'});
          return;
        }catch(e){ /* ユーザーがキャンセルした場合など。フォールバックへ */ }
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'buzzshorts-result.png';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    }, 'image/png');
  }

  function wrapText(ctx, text, x, y, maxWidth, lineHeight){
    const chars = [...text];
    let line = '';
    let curY = y;
    for(const ch of chars){
      const test = line + ch;
      if(ctx.measureText(test).width > maxWidth && line !== ''){
        ctx.fillText(line, x, curY);
        line = ch;
        curY += lineHeight;
      } else {
        line = test;
      }
    }
    if(line) ctx.fillText(line, x, curY);
  }

  // ---- 予想ダッシュボード（予想タブ） ---------------------------------
  function buildPredictDashCard(){
    const card = document.createElement('div');
    card.className = 'predict-dash';

    const total = predictStats.totalJudged;
    const rate = total > 0 ? Math.round((predictStats.totalHit / total) * 100) : 0;

    const genreRows = Object.entries(predictStats.genreStats)
      .filter(([, s]) => s.total > 0)
      .sort((a, b) => b[1].total - a[1].total)
      .map(([g, s]) => {
        const label = GENRES.find(x => x.id === g)?.[LANG] || g;
        const r = Math.round((s.hit / s.total) * 100);
        return `<div class="predict-history-item"><div class="info"><div class="title">${label}</div><div class="meta">${s.hit}/${s.total} (${r}%)</div></div></div>`;
      }).join('');

    const badgeHTML = predictStats.badges.length
      ? predictStats.badges.map(b => `<span class="predict-badge-pill">🏅 ${b}</span>`).join('')
      : '';

    const history = Object.entries(predictions)
      .sort((a, b) => b[1].predictedAt - a[1].predictedAt)
      .slice(0, 30)
      .map(([id, p]) => {
        const statusHTML = p.judged
          ? `<span class="${p.hit ? 'hit' : 'miss'}">${p.hit ? t('predictHit') : t('predictMiss')}</span> ・ ${t('predictActual', p.sixHourGrowthRatio ?? '—')}`
          : `<span>${t('predictPending')}</span>`;
        return `
          <div class="predict-history-item">
            <img src="${p.thumbnail || ''}" alt="" loading="lazy">
            <div class="info">
              <div class="title">${escapeHTML(p.videoTitle || '')}</div>
              <div class="meta">${t('predictMade', tierLabel(p.tier, true))} ・ ${statusHTML}</div>
            </div>
          </div>
        `;
      }).join('');

    card.innerHTML = `
      <h2>${t('predictDashTitle')}</h2>
      <div class="predict-stat-grid">
        <div class="predict-stat"><span class="num">${predictStats.streak}</span><span class="label">${t('predictStatStreak')}</span></div>
        <div class="predict-stat"><span class="num">${predictStats.bestStreak}</span><span class="label">${t('predictStatBest')}</span></div>
        <div class="predict-stat"><span class="num">${rate}%</span><span class="label">${t('predictStatRate')}</span></div>
      </div>
      <div class="predict-badges">${badgeHTML}</div>
      ${genreRows}
      ${history || `<p style="color:var(--text-dim);font-size:12.5px;line-height:1.7;">${t('predictHistoryEmpty')}</p>`}
    `;
    return card;
  }

  // 予想カード上のカウントダウン表示を定期更新する
  setInterval(() => {
    document.querySelectorAll('.predict-countdown[data-video-id]').forEach(el => {
      const video = allVideos.find(v => v.id === el.dataset.videoId);
      if(!video) return;
      el.textContent = formatCountdown(video);
    });
  }, 30000);

  // ---- genre tabs ---------------------------------------------
  function renderTabs(){
    tabsEl.innerHTML = '';

    const specials = [];
    if(favoriteGenres.length > 0){
      specials.push({id:'myfeed', label: t('myFeed'), special:true});
    }
    specials.push({id:'clips', label: t('clips'), special:true});
    specials.push({id:'predict', label: t('predictTab'), special:true});

    specials.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'genre-tab special' + (s.id === currentGenre ? ' active' : '');
      btn.textContent = s.label;
      btn.addEventListener('click', () => {
        currentGenre = s.id;
        renderTabs();
        renderFeed();
      });
      tabsEl.appendChild(btn);
    });

    GENRES.forEach(g => {
      const present = g.id === 'all' || allVideos.some(v => v.genre === g.id);
      if(!present) return;
      const btn = document.createElement('button');
      btn.className = 'genre-tab' + (g.id === currentGenre ? ' active' : '');
      btn.textContent = g[LANG];
      btn.addEventListener('click', () => {
        currentGenre = g.id;
        renderTabs();
        renderFeed();
      });
      tabsEl.appendChild(btn);
    });
  }

  // ---- spike meter bars -----------------------------------------
  function spikeMeterHTML(ratio, isHero){
    const bars = 5;
    let html = `<div class="spike-meter${isHero ? ' hot' : ''}">`;
    for(let i = 0; i < bars; i++){
      // 比率が高いほど速いパルス。少しランダムにずらして「生きてる」感を出す
      const speed = Math.max(0.45, 1.6 - (ratio / 60) - i * 0.07);
      const delay = (i * 0.08).toFixed(2);
      html += `<div class="bar" style="animation-duration:${speed.toFixed(2)}s; animation-delay:-${delay}s;"></div>`;
    }
    html += `</div>`;
    return html;
  }

  // ---- card ------------------------------------------------------
  function buildCard(video, isHero){
    const card = document.createElement('section');
    card.className = 'card';
    card.dataset.videoId = video.id;

    const genreLabel = GENRES.find(g => g.id === video.genre)?.[LANG] || video.genre;
    const ratio = Math.max(1, Math.round(video.growthRatio || (video.viewCount / Math.max(video.subscriberCount, 1))));

    card.innerHTML = `
      <div class="card-inner">
        <div class="autoplay-progress"><div class="fill"></div></div>
        <div class="media">
          <img src="${video.thumbnail}" alt="" loading="lazy">
          <div class="play-hint">
            <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
          </div>
          <div class="tap-layer"></div>
        </div>
        <button class="round-btn clip-toggle${isClipped(video.id) ? ' active' : ''}" aria-label="save">
          ${clipIcon(isClipped(video.id))}
        </button>
        <button class="round-btn sound-toggle" aria-label="toggle sound">
          ${soundIcon()}
        </button>
        <div class="overlay">
          <div class="overlay-main">
            <div class="eyebrow${isHero ? ' hot' : ''}">
              <span class="dot"></span>
              ${isHero ? t('heroLabel') + ' · ' : ''}${t('spike', ratio)}
            </div>
            <div class="genre-pill">${genreLabel}</div>
            <div class="channel">${escapeHTML(video.channelTitle)} · ${t('hoursAgo', hoursAgo(video.publishedAt))}</div>
            <div class="title">${escapeHTML(video.title)}</div>
            <div class="stats">
              <span>${t('views', formatNumber(video.viewCount))}</span>
              <span>${t('subs', formatNumber(video.subscriberCount))}</span>
            </div>
          </div>
          ${spikeMeterHTML(ratio, isHero)}
        </div>
      </div>
    `;

    card.querySelector('.overlay-main').appendChild(buildPredictBlock(video));

    card.querySelector('.sound-toggle').addEventListener('click', (e) => {
      e.stopPropagation();
      MUTED = !MUTED;
      localStorage.setItem('buzzshorts_muted', MUTED);
      card.querySelector('.sound-toggle').innerHTML = soundIcon();
      if(activePlayer && activeCardId === video.id){
        MUTED ? activePlayer.mute() : activePlayer.unMute();
      }
    });

    card.querySelector('.clip-toggle').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleClip(video);
      const btn = card.querySelector('.clip-toggle');
      const nowClipped = isClipped(video.id);
      btn.classList.toggle('active', nowClipped);
      btn.innerHTML = clipIcon(nowClipped);
    });

    return card;
  }

  function soundIcon(){
    return MUTED
      ? `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12A4.5 4.5 0 0 0 14 8v8a4.5 4.5 0 0 0 2.5-4Z"/><path d="M3 9v6h4l5 5V4L7 9H3Z"/><path d="M19.5 4.5l-15 15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3Z"/><path d="M16.5 12A4.5 4.5 0 0 0 14 8v8a4.5 4.5 0 0 0 2.5-4Z"/><path d="M19 5a8 8 0 0 1 0 14" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>`;
  }

  function clipIcon(active){
    return active
      ? `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 2.5h12a1 1 0 0 1 1 1V21l-7-4.5L5 21V3.5a1 1 0 0 1 1-1Z"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2.5h12a1 1 0 0 1 1 1V21l-7-4.5L5 21V3.5a1 1 0 0 1 1-1Z" stroke-linejoin="round"/></svg>`;
  }

  function escapeHTML(s){
    const div = document.createElement('div');
    div.textContent = s ?? '';
    return div.innerHTML;
  }

  // ---- feed rendering -----------------------------------------
  function renderFeed(){
    feedEl.innerHTML = '';

    if(currentGenre === 'predict'){
      emptyStatus.classList.add('hidden');
      const card = document.createElement('section');
      card.className = 'card';
      card.appendChild(buildPredictDashCard());
      feedEl.appendChild(card);
      feedEl.scrollTop = 0;
      return;
    }

    let list;
    let allowHero = false;

    // predictionOnly: 答え合わせ待ちのために裏で保持しているだけの動画。
    // 表示枠から間引かれた動画なので、通常のフィードには出さない。
    const displayableVideos = allVideos.filter(v => !v.predictionOnly);

    if(currentGenre === 'clips'){
      list = clips.slice(); // 保存した順（新しい順）のまま
    } else if(currentGenre === 'myfeed'){
      list = displayableVideos.filter(v => favoriteGenres.includes(v.genre));
      allowHero = true;
    } else if(currentGenre === 'all'){
      list = displayableVideos.slice();
      allowHero = true;
    } else {
      list = displayableVideos.filter(v => v.genre === currentGenre);
    }

    // クリップタブは保存した順を保持。それ以外は選択中の並び替えモードを適用
    if(currentGenre !== 'clips'){
      if(sortMode === 'new'){
        list.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
      } else if(sortMode === 'views'){
        list.sort((a, b) => (b.viewCount || 0) - (a.viewCount || 0));
      } else {
        list.sort((a, b) => (b.growthRatio || 0) - (a.growthRatio || 0));
      }
    }

    if(list.length === 0){
      emptyLabel.textContent = currentGenre === 'clips' ? t('clipsEmpty') : t('empty');
      emptyStatus.classList.remove('hidden');
      return;
    }
    emptyStatus.classList.add('hidden');

    list.forEach((video, i) => {
      const isHero = allowHero && sortMode === 'spike' && i === 0;
      feedEl.appendChild(buildCard(video, isHero));
    });

    feedEl.scrollTop = 0;
    setupObserver();
  }

  // ---- YouTube player control -----------------------------------
  function onYouTubeIframeAPIReady(){
    ytReady = true;
    if(pendingActivate){
      activateCard(pendingActivate);
      pendingActivate = null;
    }
  }
  window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

  function activateCard(card){
    if(!ytReady){ pendingActivate = card; return; }
    const videoId = card.dataset.videoId;
    if(activeCardId === videoId) return;
    deactivateCurrent();

    const media = card.querySelector('.media');
    const img = media.querySelector('img');
    const hint = media.querySelector('.play-hint');
    if(img) img.style.display = 'none';
    if(hint) hint.style.display = 'none';

    const holder = document.createElement('div');
    media.appendChild(holder);

    const playerVars = {
      autoplay:1, mute: MUTED ? 1 : 0,
      playsinline:1, controls:0, rel:0, modestbranding:1, disablekb:1
    };
    if(!autoplayChain){
      playerVars.loop = 1;
      playerVars.playlist = videoId; // loop:1には同じ動画IDのplaylistが必須
    }

    activePlayer = new YT.Player(holder, {
      videoId,
      playerVars,
      events:{
        onReady:(e) => {
          MUTED ? e.target.mute() : e.target.unMute();
          e.target.playVideo();
        },
        onStateChange:(e) => {
          if(e.data === YT.PlayerState.PLAYING){
            startProgressTimer(card, e.target);
          } else if(e.data === YT.PlayerState.ENDED){
            stopProgressTimer();
            if(autoplayChain){
              goToNextCard(card);
            }
          } else {
            stopProgressTimer();
          }
        }
      }
    });
    activeCardId = videoId;

    // controlsを消した分、動画部分タップで再生/一時停止できるようにする
    holder.style.pointerEvents = 'none'; // iframe自体はタップを奪わない
    const tapLayer = media.querySelector('.tap-layer');
    if(tapLayer) tapLayer.onclick = () => {
      if(!activePlayer) return;
      const state = activePlayer.getPlayerState();
      if(state === YT.PlayerState.PLAYING) activePlayer.pauseVideo();
      else activePlayer.playVideo();
    };
  }

  function startProgressTimer(card, player){
    stopProgressTimer();
    const fill = card.querySelector('.autoplay-progress .fill');
    if(!fill) return;
    progressTimer = setInterval(() => {
      try{
        const duration = player.getDuration();
        const current = player.getCurrentTime();
        if(duration > 0){
          fill.style.width = Math.min(100, (current / duration) * 100) + '%';
        }
      }catch(err){ /* プレイヤー破棄直後の呼び出しは無視 */ }
    }, 200);
  }

  function stopProgressTimer(){
    if(progressTimer){
      clearInterval(progressTimer);
      progressTimer = null;
    }
  }

  function goToNextCard(card){
    const next = card.nextElementSibling;
    if(next){
      next.scrollIntoView({behavior:'smooth', block:'start'});
    }
  }

  function deactivateCurrent(){
    if(!activePlayer) return;
    stopProgressTimer();
    try{ activePlayer.destroy(); }catch(err){}
    activePlayer = null;

    if(activeCardId){
      const card = feedEl.querySelector(`.card[data-video-id="${activeCardId}"]`);
      if(card){
        const media = card.querySelector('.media');
        const img = media.querySelector('img');
        const hint = media.querySelector('.play-hint');
        const holder = media.querySelector('div:not(.play-hint)');
        const fill = card.querySelector('.autoplay-progress .fill');
        if(holder) holder.remove();
        if(img) img.style.display = '';
        if(hint) hint.style.display = '';
        if(fill) fill.style.width = '0%';
      }
    }
    activeCardId = null;
  }

  let observer = null;
  function setupObserver(){
    if(observer) observer.disconnect();
    observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting && entry.intersectionRatio > 0.6){
          activateCard(entry.target);
        }
      });
    }, {root: feedEl, threshold: [0.6]});

    feedEl.querySelectorAll('.card').forEach(card => observer.observe(card));
  }

  // ---- 並び替え ------------------------------------------------
  sortBtn.addEventListener('click', () => {
    const idx = SORT_MODES.indexOf(sortMode);
    sortMode = SORT_MODES[(idx + 1) % SORT_MODES.length];
    localStorage.setItem('buzzshorts_sort', sortMode);
    applySortBtnLabel();
    showToast(t('sortNames')[sortMode]);
    renderFeed();
  });

  function applySortBtnLabel(){
    sortBtn.innerHTML = SORT_ICON[sortMode];
    sortBtn.title = t('sortNames')[sortMode];
  }

  // ---- 自動送り --------------------------------------------------
  autoplayBtn.addEventListener('click', () => {
    autoplayChain = !autoplayChain;
    localStorage.setItem('buzzshorts_autoplay', autoplayChain);
    applyAutoplayBtnLabel();
    showToast(autoplayChain ? t('autoplayOn') : t('autoplayOff'));
    // 設定変更を即座に反映するため、現在再生中のプレイヤーを再起動
    if(activeCardId){
      const card = feedEl.querySelector(`.card[data-video-id="${activeCardId}"]`);
      if(card) activateCard(card);
    }
  });

  function applyAutoplayBtnLabel(){
    autoplayBtn.classList.toggle('autoplay-on', autoplayChain);
  }

  // ---- ジャンル設定モーダル ---------------------------------------
  function openGenreModal(){
    modalPillSelection = new Set(favoriteGenres);
    renderModalPills();
    applyModalLangUI();
    genreModal.classList.remove('hidden');
  }
  function closeGenreModal(){
    genreModal.classList.add('hidden');
  }
  function renderModalPills(){
    modalPillsEl.innerHTML = '';
    GENRES.filter(g => g.id !== 'all').forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'pill-choice' + (modalPillSelection.has(g.id) ? ' selected' : '');
      btn.textContent = g[LANG];
      btn.addEventListener('click', () => {
        if(modalPillSelection.has(g.id)) modalPillSelection.delete(g.id);
        else modalPillSelection.add(g.id);
        btn.classList.toggle('selected');
      });
      modalPillsEl.appendChild(btn);
    });
  }
  function applyModalLangUI(){
    modalTitleEl.textContent = t('modalTitle');
    modalDescEl.textContent = t('modalDesc');
    modalSaveBtn.textContent = t('modalSave');
    modalSkipBtn.textContent = t('modalSkip');
  }

  settingsBtn.addEventListener('click', openGenreModal);
  modalSkipBtn.addEventListener('click', closeGenreModal);
  modalSaveBtn.addEventListener('click', () => {
    favoriteGenres = [...modalPillSelection];
    localStorage.setItem('buzzshorts_favorites', JSON.stringify(favoriteGenres));
    localStorage.setItem('buzzshorts_onboarded', 'true');
    closeGenreModal();
    if(favoriteGenres.length > 0){
      currentGenre = 'myfeed';
    }
    renderTabs();
    renderFeed();
  });

  // ---- language toggle ------------------------------------------
  langBtn.addEventListener('click', () => {
    LANG = LANG === 'ja' ? 'en' : 'ja';
    localStorage.setItem('buzzshorts_lang', LANG);
    applyLangUI();
    renderTabs();
    renderFeed();
  });

  function applyLangUI(){
    document.documentElement.lang = LANG;
    langBtn.textContent = t('langBtn');
    loadingLabel.textContent = t('loading').toUpperCase();
    applySortBtnLabel();
    applyAutoplayBtnLabel();
    if(!genreModal.classList.contains('hidden')) applyModalLangUI();
  }

  // ---- data load ---------------------------------------------------
  async function init(){
    applyLangUI();
    updateStreak();

    try{
      const res = await fetch('data/shorts.json', {cache:'no-store'});
      if(!res.ok) throw new Error('fetch failed');
      const json = await res.json();
      allVideos = json.videos || [];
      if(json.generatedAt){
        const d = new Date(json.generatedAt);
        updatedAtEl.textContent = t('updated', d.toLocaleString(LANG === 'ja' ? 'ja-JP' : 'en-US', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}));
      }
    }catch(err){
      allVideos = [];
    }
    checkResolutions();
    loadingStatus.classList.add('hidden');
    renderTabs();
    renderFeed();

    // 初回訪問ならジャンル設定モーダルを開く
    if(!localStorage.getItem('buzzshorts_onboarded')){
      setTimeout(openGenreModal, 500);
    }
  }

  init();

  // ---- PWA: サービスワーカー登録 -----------------------------------
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
  </script>
</body>
</html>
