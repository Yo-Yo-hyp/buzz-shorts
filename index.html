<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{
    --bg:#0B0E11;
    --surface:#161B22;
    --text:#F5F3EE;
    --text-dim:#8A8F98;
    --spike:#D4FF3D;
    --hot:#FF5C3D;
    --font-display:'Space Mono', monospace;
    --font-body:'Noto Sans JP', sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  body{
    background-image:
      radial-gradient(circle at 15% 10%, rgba(212,255,61,0.05), transparent 35%),
      radial-gradient(circle at 85% 90%, rgba(255,92,61,0.05), transparent 35%);
  }
  button{font-family:inherit;}

  /* ===== Top bar ===== */
  .topbar{
    position:fixed;
    top:0;left:0;right:0;
    z-index:50;
    display:flex;
    flex-direction:column;
    gap:8px;
    padding:max(10px, env(safe-area-inset-top)) 14px 12px;
    background:linear-gradient(to bottom, rgba(11,14,17,0.94) 60%, rgba(11,14,17,0));
    pointer-events:none;
  }
  .topbar > *{pointer-events:auto;}

  .topbar-row{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .logo{
    font-family:var(--font-display);
    font-weight:700;
    font-size:13px;
    letter-spacing:0.06em;
    flex-shrink:0;
    white-space:nowrap;
  }
  .logo .accent{color:var(--spike);}

  .topbar-spacer{flex:1;}

  /* 丸ピル型のアイコンボタン共通 */
  .icon-btn{
    font-family:var(--font-display);
    font-size:12px;
    letter-spacing:0.04em;
    padding:6px 11px;
    border:1px solid rgba(245,243,238,0.18);
    border-radius:999px;
    background:rgba(11,14,17,0.4);
    color:var(--text);
    cursor:pointer;
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:5px;
    line-height:1;
  }
  .icon-btn.streak{
    color:var(--hot);
    border-color:rgba(255,92,61,0.35);
    font-weight:700;
  }
  .icon-btn.autoplay-on{
    color:var(--bg);
    background:var(--spike);
    border-color:var(--spike);
    font-weight:700;
  }

  .genre-tabs{
    display:flex;
    gap:6px;
    overflow-x:auto;
    flex:1;
    scrollbar-width:none;
    -ms-overflow-style:none;
  }
  .genre-tabs::-webkit-scrollbar{display:none;}
  .genre-tab{
    font-family:var(--font-display);
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    padding:6px 12px;
    border:1px solid rgba(245,243,238,0.18);
    border-radius:999px;
    color:var(--text-dim);
    white-space:nowrap;
    cursor:pointer;
    background:rgba(11,14,17,0.4);
    transition:background .15s, color .15s, border-color .15s;
    flex-shrink:0;
  }
  .genre-tab.active{
    color:var(--bg);
    background:var(--spike);
    border-color:var(--spike);
    font-weight:700;
  }
  .genre-tab.special.active{
    background:var(--hot);
    border-color:var(--hot);
  }

  /* ===== Feed ===== */
  .feed{
    height:100vh;
    height:100dvh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scrollbar-width:none;
  }
  .feed::-webkit-scrollbar{display:none;}

  .card{
    height:100vh;
    height:100dvh;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    animation:cardFadeIn .4s ease-out;
  }
  @keyframes cardFadeIn{
    0%{opacity:0; transform:translateY(20px);}
    100%{opacity:1; transform:translateY(0);}
  }

  .card-inner{
    position:relative;
    width:100%;
    height:100%;
    max-width:480px;
    margin:0 auto;
    background:#000;
    overflow:hidden;
  }
  @media (min-width:560px){
    .card-inner{
      height:calc(100% - 32px);
      margin:16px auto;
      border-radius:22px;
      box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);
    }
  }

  .media{position:absolute;inset:0;background:#000;}
  .media img{
    width:100%;height:100%;object-fit:cover;
    filter:brightness(0.92);
  }
  .media iframe{
    width:100%;height:100%;border:0;
    object-fit:cover;
    pointer-events:none; /* controlsを消してるので、操作はtap-layerに任せる */
  }
  .tap-layer{
    position:absolute;inset:0;
    z-index:3;
    background:transparent;
  }

  .play-hint{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .play-hint svg{
    width:54px;height:54px;
    opacity:0.85;
    filter:drop-shadow(0 4px 16px rgba(0,0,0,0.5));
  }

  /* ===== Floating round buttons on the card ===== */
  .round-btn{
    position:absolute;
    top:max(96px, calc(env(safe-area-inset-top) + 88px));
    width:38px;height:38px;
    border-radius:50%;
    background:rgba(11,14,17,0.55);
    border:1px solid rgba(245,243,238,0.18);
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    z-index:10;
    backdrop-filter:blur(4px);
  }
  .round-btn svg{width:18px;height:18px;}
  .sound-toggle{right:14px;}
  .clip-toggle{left:14px;}
  .clip-toggle.active{
    color:var(--spike);
    border-color:rgba(212,255,61,0.5);
  }

  /* ===== Autoplay progress bar ===== */
  .autoplay-progress{
    position:absolute;
    top:0;left:0;right:0;
    height:3px;
    background:rgba(245,243,238,0.12);
    z-index:4;
  }
  .autoplay-progress .fill{
    height:100%;
    width:0%;
    background:var(--spike);
    transition:width .2s linear;
  }

  /* ===== Overlay info ===== */
  .overlay{
    position:absolute;
    left:0;right:0;bottom:0;
    padding:18px 16px max(18px, env(safe-area-inset-bottom)) 16px;
    background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.55) 45%, transparent 100%);
    display:flex;
    align-items:flex-end;
    gap:12px;
    z-index:8;
  }
  .overlay-main{flex:1;min-width:0;}

  .eyebrow{
    font-family:var(--font-display);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--spike);
    display:flex;
    align-items:center;
    gap:6px;
    margin-bottom:8px;
    font-weight:700;
  }
  .eyebrow.hot{color:var(--hot);}
  .eyebrow .dot{
    width:6px;height:6px;border-radius:50%;
    background:currentColor;
    animation:blink 1s ease-in-out infinite;
  }

  .genre-pill{
    font-family:var(--font-display);
    font-size:10px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-dim);
    border:1px solid rgba(245,243,238,0.18);
    border-radius:999px;
    padding:2px 8px;
    margin-bottom:8px;
    display:inline-block;
  }

  .channel{
    font-size:12.5px;
    color:var(--text-dim);
    margin-bottom:4px;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
  }
  .title{
    font-size:15px;
    font-weight:700;
    line-height:1.45;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .stats{
    font-family:var(--font-display);
    font-size:11px;
    color:var(--text-dim);
    margin-top:8px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }

  /* ===== Spike meter ===== */
  .spike-meter{
    display:flex;
    align-items:flex-end;
    gap:3px;
    height:46px;
    flex-shrink:0;
    padding-bottom:4px;
  }
  .spike-meter .bar{
    width:5px;
    border-radius:3px;
    background:var(--spike);
    transform-origin:bottom;
    animation:pulse ease-in-out infinite;
  }
  .spike-meter.hot .bar{background:var(--hot);}

  @keyframes pulse{
    0%,100%{transform:scaleY(0.25);}
    50%{transform:scaleY(1);}
  }
  @keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0.25;}
  }

  /* ===== Status screens ===== */
  .status{
    position:fixed;inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    text-align:center;
    padding:24px;
    z-index:100;
    pointer-events:none; /* 中身はテキストのみなので、下のタブバーへのクリックを妨げない */
  }
  .status.hidden{display:none;}
  .status .big{
    font-family:var(--font-display);
    font-size:14px;
    letter-spacing:0.1em;
    color:var(--spike);
  }
  .status p{
    color:var(--text-dim);
    font-size:13px;
    max-width:320px;
    line-height:1.7;
  }
  .spinner{
    width:28px;height:28px;
    border:2px solid rgba(212,255,61,0.25);
    border-top-color:var(--spike);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .updated{
    position:fixed;
    bottom:max(10px, env(safe-area-inset-bottom));
    left:14px;
    font-family:var(--font-display);
    font-size:10px;
    color:rgba(245,243,238,0.35);
    z-index:40;
    pointer-events:none;
  }

  /* ===== Toast ===== */
  .toast{
    position:fixed;
    top:max(64px, calc(env(safe-area-inset-top) + 56px));
    left:50%;
    transform:translateX(-50%) translateY(-8px);
    background:var(--surface);
    border:1px solid rgba(212,255,61,0.4);
    color:var(--text);
    font-size:12.5px;
    font-family:var(--font-display);
    padding:10px 18px;
    border-radius:999px;
    z-index:150;
    box-shadow:0 10px 30px -10px rgba(0,0,0,0.6);
    opacity:0;
    transition:opacity .3s, transform .3s;
    pointer-events:none;
    white-space:nowrap;
    max-width:90vw;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
    animation:toastSlide .3s ease-out;
  }
  @keyframes toastSlide{
    0%{transform:translateX(-50%) translateY(-12px); opacity:0;}
    100%{transform:translateX(-50%) translateY(0); opacity:1;}
  }

  /* ===== Predict block (on video cards) ===== */
  .predict-block{
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid rgba(245,243,238,0.14);
  }
  .predict-countdown{
    font-family:var(--font-display);
    font-size:10.5px;
    color:var(--text-dim);
    margin-bottom:8px;
    letter-spacing:0.04em;
  }
  .predict-countdown.urgent{color:var(--hot);}
  .predict-tier-row{
    display:flex;
    gap:6px;
    margin-bottom:8px;
  }
  .predict-tier-btn{
    flex:1;
    background:rgba(11,14,17,0.55);
    border:1px solid rgba(245,243,238,0.2);
    color:var(--text);
    font-size:11.5px;
    font-weight:700;
    padding:8px 4px;
    border-radius:10px;
    cursor:pointer;
    text-align:center;
    line-height:1.3;
    transition:all .15s;
  }
  .predict-tier-btn:active{transform:scale(0.96);}
  .predict-tier-btn.active{
    background:var(--spike);
    border-color:var(--spike);
    color:var(--bg);
    box-shadow:0 4px 12px rgba(212,255,61,0.2);
  }
  .predict-confidence-row{
    display:flex;
    gap:6px;
  }
  .predict-confidence-btn{
    flex:1;
    background:transparent;
    border:1px solid rgba(245,243,238,0.16);
    color:var(--text-dim);
    font-size:10.5px;
    padding:5px 4px;
    border-radius:999px;
    cursor:pointer;
    text-align:center;
  }
  .predict-confidence-btn.active{
    color:var(--bg);
    background:var(--spike);
    border-color:var(--spike);
    font-weight:700;
  }
  .predict-waiting{
    font-size:12px;
    color:var(--text-dim);
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .predict-waiting .my-pick{
    color:var(--text);
    font-weight:700;
  }
  .predict-result{
    font-size:12.5px;
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .predict-result .hit{color:var(--spike);font-weight:700;}
  .predict-result .miss{color:var(--hot);font-weight:700;}
  .predict-share-btn{
    background:transparent;
    border:1px solid rgba(245,243,238,0.24);
    color:var(--text);
    font-size:11px;
    padding:5px 10px;
    border-radius:999px;
    cursor:pointer;
  }

  /* ===== Predict dashboard / history (予想タブ) ===== */
  .predict-dash{
    width:100%;
    height:100%;
    max-width:480px;
    overflow-y:auto;
    padding:max(96px, calc(env(safe-area-inset-top) + 88px)) 18px 40px;
  }
  .predict-dash h2{
    font-family:var(--font-display);
    font-size:15px;
    margin-bottom:14px;
  }
  .predict-stat-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:18px;
  }
  .predict-stat{
    background:var(--surface);
    border:1px solid rgba(245,243,238,0.1);
    border-radius:12px;
    padding:12px 8px;
    text-align:center;
    transition:all .2s;
  }
  .predict-stat:hover{
    border-color:rgba(212,255,61,0.3);
    box-shadow:0 4px 12px rgba(212,255,61,0.06);
  }
  .predict-stat .num{
    font-family:var(--font-display);
    font-size:20px;
    color:var(--spike);
    display:block;
  }
  .predict-stat .label{
    font-size:10.5px;
    color:var(--text-dim);
    margin-top:2px;
  }
  .predict-badges{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:18px;
  }
  .predict-badge-pill{
    font-size:11px;
    background:var(--surface);
    border:1px solid rgba(212,255,61,0.3);
    color:var(--spike);
    padding:4px 10px;
    border-radius:999px;
    animation:badgePop .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes badgePop{
    0%{transform:scale(0.8); opacity:0;}
    50%{transform:scale(1.1);}
    100%{transform:scale(1); opacity:1;}
  }
  .predict-history-item{
    display:flex;
    gap:10px;
    padding:10px 0;
    border-bottom:1px solid rgba(245,243,238,0.08);
  }
  .predict-history-item img{
    width:64px;height:64px;
    object-fit:cover;
    border-radius:8px;
    flex-shrink:0;
    background:var(--surface);
  }
  .predict-history-item .info{min-width:0;flex:1;}
  .predict-history-item .title{
    font-size:12.5px;
    line-height:1.4;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    margin-bottom:4px;
  }
  .predict-history-item .meta{
    font-size:11px;
    color:var(--text-dim);
  }

  /* ===== Modal (genre settings) ===== */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(11,14,17,0.78);
    backdrop-filter:blur(4px);
    z-index:200;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .modal-overlay.hidden{display:none;}
  .modal{
    background:var(--surface);
    border:1px solid rgba(245,243,238,0.1);
    border-radius:20px;
    padding:24px;
    max-width:380px;
    width:100%;
    max-height:80vh;
    overflow-y:auto;
  }
  .modal h2{
    font-family:var(--font-display);
    font-size:14px;
    letter-spacing:0.06em;
    color:var(--spike);
    margin-bottom:8px;
  }
  .modal p{
    font-size:12.5px;
    color:var(--text-dim);
    line-height:1.7;
    margin-bottom:18px;
  }
  .pill-grid{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:22px;
  }
  .pill-choice{
    font-family:var(--font-display);
    font-size:11px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:8px 14px;
    border-radius:999px;
    border:1px solid rgba(245,243,238,0.18);
    background:rgba(11,14,17,0.4);
    color:var(--text-dim);
    cursor:pointer;
  }
  .pill-choice.selected{
    background:var(--spike);
    border-color:var(--spike);
    color:var(--bg);
    font-weight:700;
  }
  .modal-actions{
    display:flex;
    gap:10px;
  }
  .modal-actions button{
    flex:1;
    font-family:var(--font-display);
    font-size:12px;
    letter-spacing:0.05em;
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(245,243,238,0.18);
    background:transparent;
    color:var(--text);
    cursor:pointer;
  }
  .modal-actions .primary{
    background:var(--spike);
    border-color:var(--spike);
    color:var(--bg);
    font-weight:700;
  }

  /* ===== Points & filters ===== */
  .icon-btn.points{
    color:var(--spike);
    border-color:rgba(212,255,61,0.4);
    font-weight:700;
    min-width:52px;
    justify-content:center;
  }
  .icon-btn.filter-on{
    color:var(--hot);
    border-color:rgba(255,92,61,0.5);
    font-weight:700;
  }
  .icon-btn.research-on{
    color:var(--spike);
    border-color:rgba(212,255,61,0.5);
    font-weight:700;
  }

  /* ===== GOLD MVP card ===== */
  .card.mvp .card-inner{

  function checkSeasonReset(){
    const month = new Date().toISOString().slice(0, 7);
    const lastMonth = localStorage.getItem('buzzshorts_season_month');
    if(lastMonth && lastMonth !== month){
      const finalScore = getPoints();
      let badge = null;
      for(const [threshold, label] of SEASON_BADGES){
        if(finalScore >= threshold) badge = label;
      }
      if(badge){
        seasonBadges.push({ month: lastMonth, score: finalScore, badge });
        localStorage.setItem('buzzshorts_season_badges', JSON.stringify(seasonBadges));

      setPoints(INITIAL_POINTS);
      showToast(t('seasonReset', badge));

    const streak = Number(localStorage.getItem('buzzshorts_streak') || '1');

  function t(key, ...args){
    const fn = I18N[LANG][key];
    return typeof fn === 'function' ? fn(...args) : fn;
  }

  function formatNumber(n){
    n = Number(n) || 0;
    if(LANG === 'ja'){
      if(n >= 100000000) return (n/100000000).toFixed(1).replace(/\.0$/,'') + '億';
      if(n >= 10000) return (n/10000).toFixed(1).replace(/\.0$/,'') + '万';
      return n.toLocaleString('ja-JP');
    }
    if(n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
    if(n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
    return n.toLocaleString('en-US');
  }

  function hoursAgo(iso){
    const diff = Date.now() - new Date(iso).getTime();
    return Math.max(0, Math.floor(diff / 3600000));
  }

  // ---- toast ----------------------------------------------------
  let toastTimer = null;
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 4000);
  }

  // ---- 観測ストリーク ---------------------------------------------
  function streakTitleFor(count){
    const tiers = STREAK_TIERS[LANG];
    let title = tiers[0][1];
    for(const [threshold, label] of tiers){
      if(count >= threshold) title = label;
    }
    return title;
  }

  function updateStreak(){
    const todayStr = new Date().toDateString();
    const lastVisit = localStorage.getItem('buzzshorts_last_visit');
    let streak = Number(localStorage.getItem('buzzshorts_streak') || '0');
    let increased = false;

    if(lastVisit !== todayStr){
      if(lastVisit){
        const diffDays = Math.round((new Date(todayStr) - new Date(lastVisit)) / 86400000);
        streak = diffDays === 1 ? streak + 1 : 1;
      } else {
        streak = 1;
      }
      increased = true;
      localStorage.setItem('buzzshorts_last_visit', todayStr);
      localStorage.setItem('buzzshorts_streak', String(streak));
    }

    streakBadge.textContent = `🔥 ${streak}`;
    if(increased){
      showToast(t('streakToast', streak, streakTitleFor(streak)));
    }
  }

  // ---- クリップ（あとで見る） --------------------------------------
  function isClipped(id){
    return clips.some(c => c.id === id);
  }
  function toggleClip(video){
    const idx = clips.findIndex(c => c.id === video.id);
    if(idx >= 0){
      clips.splice(idx, 1);
    } else {
      clips.unshift({...video, savedAt: Date.now()});
    }
    localStorage.setItem('buzzshorts_clips', JSON.stringify(clips));
    if(currentGenre === 'clips'){
      renderFeed();

  function checkBankruptcy(){
    if(getPoints() > 0){
      bankruptcyOverlay.classList.add('hidden');
      return;
    }
    bankruptcyOverlay.classList.remove('hidden');
    const done = bankruptcyState.watched.length;
    bankruptcyProgress.textContent = `${done} / ${BANKRUPTCY_VIDEOS_NEEDED} 本完了`;
    bankruptcyClaim.disabled = done < BANKRUPTCY_VIDEOS_NEEDED || bankruptcyState.claimed;
  }

  function trackBankruptcyWatch(videoId, seconds){
    if(getPoints() > 0) return;
    if(predictions[videoId]) return;
    const existing = bankruptcyState.watched.find(w => w.id === videoId);
    if(existing){
      existing.seconds = Math.max(existing.seconds, seconds);
    } else if(bankruptcyState.watched.length < BANKRUPTCY_VIDEOS_NEEDED){
      bankruptcyState.watched.push({ id: videoId, seconds });
    }
    bankruptcyState.watched = bankruptcyState.watched.filter(w => w.seconds >= BANKRUPTCY_WATCH_SEC);
    saveBankruptcy();
    checkBankruptcy();
  }

  bankruptcyClaim.addEventListener('click', () => {
    if(bankruptcyState.watched.length >= BANKRUPTCY_VIDEOS_NEEDED && !bankruptcyState.claimed){
      bankruptcyState.claimed = true;
      bankruptcyState.watched = [];
      saveBankruptcy();
      setPoints(BANKRUPTCY_RESCUE);
      bankruptcyOverlay.classList.add('hidden');
      showToast(t('bankruptcyClaim'));
    }
  });

  // ---- 予想ゲーム ロジック -----------------------------------------
  function tierLabel(tierId, short){
    const tier = PREDICT_TIERS.find(t => t.id === tierId);
    if(!tier) return tierId;
    return short ? tier.short[LANG] : tier[LANG];
  }

  function predictTargetTime(video){
    const hours = video.predictCheckHours || 6;
    return new Date(video.firstSeenAt || video.publishedAt).getTime() + hours * 3600000;
  }

  function formatCountdown(video){
    const remainMs = predictTargetTime(video) - Date.now();
    if(remainMs <= 0) return t('predictCountdownDone');
    const totalMin = Math.floor(remainMs / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return t('predictCountdown', h, m);
  }

  function getCurrentGrowthRatio(video){
    return (video.viewCount || 0) / Math.max(video.firstSeenViewCount || video.viewCount || 1, 1);
  }

  function calcPayout(video, bet, hit){
    if(!hit) return 0;
    let payout = bet.points * TIER_ODDS[bet.tier];
    const mults = [];
    if(video.subscriberCount < 100 && bet.tier === 'blast'){
      payout *= 2;
      mults.push('bigHole');
    }
    if(favoriteGenres.includes(video.genre || bet.genre)){
      payout *= 1.2;
      mults.push('genre');
    }
    const hoursSinceSeen = (bet.predictedAt - new Date(video.firstSeenAt || video.publishedAt).getTime()) / 3600000;
    if(hoursSinceSeen <= 1){
      payout *= 1.5;
      mults.push('time');
    }
    return { payout: Math.round(payout), mults };
  }

  function submitBet(video, tier, amount){
    const existing = predictions[video.id];
    if(video.resolvedTier) return;
    if(amount <= 0 || amount > getPoints()) {
      showToast(t('notEnoughPoints'));
      return;
    }
    const totalBet = existing ? existing.bets.reduce((s, b) => s + b.points, 0) : 0;
    if(totalBet + amount > getPoints()){
      showToast(t('notEnoughPoints'));
      return;
    }
    setPoints(getPoints() - amount);
    if(!existing){
      predictions[video.id] = {
        bets: [],
        genre: video.genre,
        videoTitle: video.title,
        thumbnail: video.thumbnail,
        subscriberCount: video.subscriberCount,
        firstSeenAt: video.firstSeenAt || video.publishedAt,
        judged: false,
        totalPayout: 0,
        anyHit: false,
      };
    }
    predictions[video.id].bets.push({
      tier, points: amount,
      predictedAt: Date.now(),
    });
    savePredictions();
    showToast(t('betPlaced', amount, tierLabel(tier, true)));
  }

  function submitPrediction(video, tier, confidence){
    submitBet(video, tier, 10);
  }

  function checkResolutions(){
    const videoMap = new Map(allVideos.map(v => [v.id, v]));
    let anyNewBadge = null;
    let lastResultToast = null;
    let pendingCount = 0;

    Object.entries(predictions).forEach(([id, p]) => {
      if(p.judged) return;
      const video = videoMap.get(id);
      if(!video || !video.resolvedTier) { pendingCount++; return; }

      let totalPayout = 0;
      let anyHit = false;
      const bets = p.bets || [{ tier: p.tier, points: 10, predictedAt: p.predictedAt }];

      bets.forEach(bet => {
        const hit = bet.tier === video.resolvedTier;
        if(hit){
          anyHit = true;
          const { payout, mults } = calcPayout(video, bet, true);
          totalPayout += payout;
          if(bet.tier === 'slow'){
            totalPayout += CONTRARIAN_BONUS;
            showToast(t('contrarianBonus', CONTRARIAN_BONUS));
          }
          if(mults.includes('bigHole')) showToast(t('bigHoleBonus'));
          if(mults.includes('time')) showToast(t('timeBetBonus'));
          if(mults.includes('genre')) showToast(t('genreBetBonus'));
        }
        predictStats.totalJudged++;
        const g = p.genre || 'other';
        if(!predictStats.genreStats[g]) predictStats.genreStats[g] = {hit:0, total:0};
        predictStats.genreStats[g].total++;
        if(hit){
          predictStats.totalHit++;
          predictStats.genreStats[g].hit++;
        }
      });

      p.judged = true;
      p.anyHit = anyHit;
      p.totalPayout = totalPayout;
      p.resolvedTier = video.resolvedTier;
      p.sixHourGrowthRatio = video.sixHourGrowthRatio;

      if(anyHit){
        addPoints(totalPayout);
        predictStats.streak++;
        if(predictStats.streak > predictStats.bestStreak) predictStats.bestStreak = predictStats.streak;
        const tiers = PREDICT_BADGE_TIERS[LANG];
        for(const [threshold, badgeName] of tiers){
          if(predictStats.streak >= threshold && !predictStats.badges.includes(badgeName)){
            predictStats.badges.push(badgeName);
            anyNewBadge = badgeName;
          }
        }
      } else {
        predictStats.streak = 0;
      }

      lastResultToast = {hit: anyHit, title: p.videoTitle};
    });

    savePredictions();
    savePredictStats();
    updateAppBadge(pendingCount);

    if(lastResultToast){
      showToast(t('predictResultToast', lastResultToast.hit, lastResultToast.title.slice(0, 24)));
    }
    if(anyNewBadge){
      setTimeout(() => showToast(t('predictBadgeToast', anyNewBadge)), 4200);
    }
  }

  function updateAppBadge(count){
    if('setAppBadge' in navigator){
      if(count > 0) navigator.setAppBadge(count).catch(() => {});
      else navigator.clearAppBadge().catch(() => {});
    }
  }

  function buildPredictProgress(video){
    const ratio = getCurrentGrowthRatio(video);
    const maxScale = 5;
    const pct = Math.min(100, (ratio / maxScale) * 100);
    const slowEnd = (TIER_BOUNDARIES.slowMax / maxScale) * 100;
    const blastStart = (TIER_BOUNDARIES.blastMin / maxScale) * 100;
    return `
      <div class="predict-progress">
        <div class="zone slow" style="left:0;width:${slowEnd}%"></div>
        <div class="zone normal" style="left:${slowEnd}%;width:${blastStart - slowEnd}%"></div>
        <div class="zone blast" style="left:${blastStart}%;width:${100 - blastStart}%"></div>
        <div class="marker" style="left:${pct}%"></div>
      </div>
    `;
  }

  function buildPredictBlock(video){
    const wrap = document.createElement('div');
    wrap.className = 'predict-block';
    const existing = predictions[video.id];

    function renderBetList(pred){
      const bets = pred?.bets || [];
      if(bets.length === 0) return '<div style="font-size:12px;color:var(--text-dim);">' + t('predictHistoryEmpty') + '</div>';
      const totalBet = bets.reduce((s, b) => s + (b.points || 0), 0);
      const rows = bets.map(b => {
        const date = new Date(b.predictedAt || Date.now());
        const time = `${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
        // compute per-bet bonus tags for display
        let tagHtml = '';
        try{
          const res = calcPayout(video, b, true) || { payout:0, mults:[] };
          if(res.mults && res.mults.length){
            tagHtml = '<div style="display:flex;gap:6px;margin-top:6px">' + res.mults.map(m => {
              if(m === 'bigHole') return `<span class=\"bonus-tag bonus-bighole\">${escapeHTML(t('bigHoleBonus'))}</span>`;
              if(m === 'time') return `<span class=\"bonus-tag bonus-time\">${escapeHTML(t('timeBetBonus'))}</span>`;
              if(m === 'genre') return `<span class=\"bonus-tag bonus-genre\">${escapeHTML(t('genreBetBonus'))}</span>`;
              return '';
            }).join('') + '</div>';
          }
        }catch(e){ tagHtml = ''; }
        return `<div style="padding:6px 0;border-bottom:1px solid rgba(245,243,238,0.04);"><div style=\"display:flex;justify-content:space-between;align-items:center\"><div style=\"font-size:13px;\"><strong style=\\"color:var(--spike)\\">${tierLabel(b.tier,true)}</strong> ${b.points}pt</div><div style=\"font-size:11px;color:var(--text-dim);\">${time}</div></div>${tagHtml}</div>`;
      }).join('');
      const summary = `<div style="font-size:11px;color:var(--spike);margin-top:8px;padding:6px;background:rgba(212,255,61,0.06);border-radius:6px;text-align:center;font-weight:700;">合計ベット: ${totalBet}pt（${bets.length}件）</div>`;
      return `<div style="margin-top:8px">${rows}${summary}</div>`;
    }

    function computeSummary(pred){
      const bets = pred?.bets || [];
      const totalBet = bets.reduce((s,b)=>s + (b.points||0), 0);
      const payouts = {};
      let maxPayout = 0;
      const multSet = new Set();
      bets.forEach(b => {
        try{
          const res = calcPayout(video, b, true) || { payout:0, mults:[] };
          const payout = res.payout || 0;
          payouts[b.tier] = (payouts[b.tier] || 0) + payout;
          if(res.mults && res.mults.length){ res.mults.forEach(m => multSet.add(m)); }
        }catch(e){ }
      });
      // max payout should reflect the max across tiers (if that tier hits, sum of bets for that tier)
      maxPayout = Object.values(payouts).reduce((m, v) => Math.max(m, v || 0), 0);
      return { totalBet, payouts, maxPayout, mults: Array.from(multSet) };
    }

    if(existing && existing.judged){
      const hitClass = existing.anyHit ? 'hit' : 'miss';
      const hitText = existing.anyHit ? `${t('predictHit')} +${existing.totalPayout}pt` : t('predictMiss');
      wrap.innerHTML = `
        <div class="predict-result">
          <span class="${hitClass}">${hitText}</span>
          <span>${t('predictActual', existing.sixHourGrowthRatio ?? '—')}</span>
          <button class="predict-share-btn" type="button">${t('predictShare')}</button>
        </div>
      `;
      wrap.querySelector('.predict-share-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        shareResultCard(video, existing);
      });
      return wrap;
    }

    if(existing && !existing.judged){
      const sum = computeSummary(existing);
      const payoutsHtml = Object.entries(sum.payouts).map(([tier,v])=>`<div style="font-size:12px;color:var(--text);">${tierLabel(tier,true)}: <strong style=\"color:var(--spike)\">+${formatNumber(v)}pt</strong></div>`).join('');
      wrap.innerHTML = `
        <div class="predict-countdown" data-video-id="${video.id}">${formatCountdown(video)}</div>
        ${buildPredictProgress(video)}
        <div style="background:rgba(212,255,61,0.06);border-radius:10px;padding:10px 8px;margin-top:8px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <div style="font-size:12px;color:var(--text-dim);">${t('hedgeInfo', sum.totalBet)}</div>
            <div style="font-size:12px;color:var(--spike);font-weight:700;">期待最大: +${formatNumber(sum.maxPayout)}pt</div>
          </div>
          <div style="font-size:10px;color:var(--text-dim);">${payoutsHtml}</div>
        </div>
        <div style="margin-top:8px">${renderBetList(existing)}</div>
      `;
      return wrap;
    }

    if(video.resolvedTier){
      wrap.innerHTML = `<div class="predict-waiting">${t('predictActual', video.sixHourGrowthRatio ?? '—')}</div>`;
      return wrap;
    }

    // betting UI (no existing bets)
    let selectedAmount = 10;
    let selectedTier = 'blast';
    function renderControls(){
      const amtBtns = BET_AMOUNTS.map(a => `<button class=\"bet-amount-btn${a===selectedAmount?' active':''}\" data-amount=\"${a}\" type=\"button\">${a}pt</button>`).join('');
      const tierBtns = PREDICT_TIERS.map(tr => `<button class=\"predict-tier-btn${tr.id===selectedTier?' active':''}\" data-tier=\"${tr.id}\" type=\"button\">${tr[LANG]} ×${TIER_ODDS[tr.id]}</button>`).join('');
      return `
        <div class="predict-countdown" data-video-id="${video.id}">${formatCountdown(video)}</div>
        ${buildPredictProgress(video)}
        <div class="bet-amount-row">${amtBtns}</div>
        <div class="predict-tier-row">${tierBtns}</div>
        <div class="hedge-summary" style="margin-top:8px;">${t('hedgeInfo', 0)}</div>
        <div class="bonus-tags" style="margin-top:6px;display:flex;gap:6px;"></div>
        <div class="expected-payout" style="margin-top:6px;font-size:12px;color:var(--spike);">期待払い戻し: 0pt</div>
      `;
    }

    wrap.innerHTML = renderControls();

    function updateSummaryUI(){
      const existingPred = predictions[video.id];
      const total = existingPred ? existingPred.bets.reduce((s,b)=>s+(b.points||0),0) : 0;
      const fakePred = existingPred ? existingPred : { bets: [{ tier: selectedTier, points: selectedAmount, predictedAt: Date.now() }] };
      const sum = computeSummary(fakePred);
      const hedge = wrap.querySelector('.hedge-summary');
      const expectEl = wrap.querySelector('.expected-payout');
      const bonusContainer = wrap.querySelector('.bonus-tags');
      if(hedge) hedge.textContent = t('hedgeInfo', sum.totalBet);
      if(expectEl) expectEl.textContent = `期待払い戻し: +${formatNumber(sum.maxPayout)}pt`;
      if(bonusContainer){

  // ---- swipe gesture handler (mobile) ----
  let touchStartX = 0;
  let touchEndX = 0;
  function handleSwipe(){
    if(!feedEl || !activeCardId) return;
    const swipeThreshold = 50;
    const diff = touchEndX - touchStartX;
    if(Math.abs(diff) < swipeThreshold) return;
    
    const cards = feedEl.querySelectorAll('.card');
    const currentIndex = Array.from(cards).findIndex(c => c.dataset.videoId === activeCardId);
    if(currentIndex < 0) return;
    
    if(diff > 0 && currentIndex > 0){
      // swipe right → prev
      cards[currentIndex - 1].scrollIntoView({behavior:'smooth', block:'start'});
    } else if(diff < 0 && currentIndex < cards.length - 1){
      // swipe left → next
      cards[currentIndex + 1].scrollIntoView({behavior:'smooth', block:'start'});
    }
  }
  feedEl.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, false);
  feedEl.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
  }, false);

  // ---- keyboard navigation ----
  document.addEventListener('keydown', (e) => {
    if(currentGenre === 'predict') return;
    const cards = feedEl.querySelectorAll('.card');
    if(!cards.length || !activeCardId) return;
    const curIdx = Array.from(cards).findIndex(c => c.dataset.videoId === activeCardId);
    if(curIdx < 0) return;
    if(e.key === 'ArrowRight' && curIdx < cards.length - 1){ e.preventDefault(); cards[curIdx + 1].scrollIntoView({behavior:'smooth', block:'start'}); }
    else if(e.key === 'ArrowLeft' && curIdx > 0){ e.preventDefault(); cards[curIdx - 1].scrollIntoView({behavior:'smooth', block:'start'}); }
    else if(e.key === ' '){ e.preventDefault(); if(activePlayer){ const state = activePlayer.getPlayerState(); state === YT.PlayerState.PLAYING ? activePlayer.pauseVideo() : activePlayer.playVideo(); } }
  }, false);

  function shareResultCard(video, prediction){
    const canvas = document.createElement('canvas');

    const grad = ctx.createLinearGradient(0, 0, 1080, 1080);
    grad.addColorStop(0, '#0B0E11');
    grad.addColorStop(1, '#161B22');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1080, 1080);

    ctx.fillStyle = prediction.hit ? '#D4FF3D' : '#FF5C3D';

    ctx.fillText(prediction.hit ? (LANG==='ja' ? '的中！' : 'HIT!') : (LANG==='ja' ? 'ハズレ' : 'MISS'), 64, 160);

    ctx.fillStyle = '#8A8F98';
    ctx.font = '400 28px "Noto Sans JP", sans-serif';
    ctx.fillText('BUZZ SHORTS', 64, 220);

    ctx.fillStyle = '#F5F3EE';
    ctx.font = '700 40px "Noto Sans JP", sans-serif';
    wrapText(ctx, video.title, 64, 340, 950, 52);

    ctx.fillStyle = '#F5F3EE';
    ctx.font = '400 32px "Noto Sans JP", sans-serif';
    const predictLine = LANG==='ja'
      ? `予想: ${tierLabel(prediction.tier)}`

    canvas.toBlob(async (blob) => {

      if(navigator.canShare && navigator.canShare({files:[file]})){
        try{
          await navigator.share({files:[file], title:'BUZZ SHORTS'});

      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    }, 'image/png');
  }

  function wrapText(ctx, text, x, y, maxWidth, lineHeight){
    const chars = [...text];
    let line = '';
    let curY = y;
    for(const ch of chars){
      const test = line + ch;
      if(ctx.measureText(test).width > maxWidth && line !== ''){
        ctx.fillText(line, x, curY);
        line = ch;
        curY += lineHeight;
      } else {
        line = test;
      }
    }
    if(line) ctx.fillText(line, x, curY);
  }

  // ---- データ分析ヘルパー -----------------------------------------
  function calcVelocity(video){
    const elapsed = Math.max(0.5, (Date.now() - new Date(video.firstSeenAt || video.publishedAt).getTime()) / 3600000);
    const delta = Math.max(0, (video.viewCount || 0) - (video.firstSeenViewCount || 0));
    const perHour = delta / elapsed;
    return (perHour / 10000).toFixed(1);
  }

  function calcBuzzDuration(video){
    const velocity = Number(calcVelocity(video));
    const spike = video.spikeRatio || video.growthRatio || 1;
    const flashPct = Math.min(95, Math.max(5, Math.round(100 - velocity * 8 - spike * 2)));
    return { flash: flashPct, tail: 100 - flashPct };
  }

  function buildAnalyticsPanel(video){
    const spikeRatio = video.spikeRatio || (video.viewCount / Math.max(video.subscriberCount, 1));
    const gaugePct = Math.min(100, spikeRatio / 50 * 100);
    const avgViews = video.estimatedAvgViews || Math.round(video.subscriberCount * 0.08);
    const gapMult = video.avgGapMultiplier || Math.round(video.viewCount / Math.max(avgViews, 1));
    const velocity = calcVelocity(video);
    const buzz = video.buzzKeywords || [];
    const templates = video.editTemplates || [];
    const grade = video.engagementGrade || 'B';
    const genreTag = video.genreSpecialization === 'cross-buzz' ? t('genreCross') : t('genreSame');
    const duration = video.durationSeconds ? `${video.durationSeconds}秒` : '';
    const buzzDur = calcBuzzDuration(video);

    let kwHTML = buzz.map(k => `<span>${escapeHTML(k)}</span>`).join('');
    let tagHTML = templates.map(tg => `<span class="analysis-tag">${escapeHTML(tg)}</span>`).join('');
    tagHTML += `<span class="analysis-tag">${genreTag}</span>`;
    if(duration) tagHTML += `<span class="analysis-tag">${duration}</span>`;

    return `
      <div class="analytics-panel">
        <div class="spike-gauge"><div class="needle" style="left:${gaugePct}%"></div></div>
        <div class="gap-display">${t('gapDisplay', formatNumber(avgViews), formatNumber(video.viewCount), gapMult)}</div>
        <div class="velocity-meter">${t('velocity', velocity)}</div>
        <div class="engagement-grade">Engagement: ${grade}</div>
        <div class="buzz-kw">${kwHTML}</div>
        <div class="analysis-tags">${tagHTML}</div>
        <div style="font-size:10px;color:var(--text-dim);margin-top:2px;">${t('buzzDuration', buzzDur.flash, buzzDur.tail)}</div>
      </div>
    `;
  }

  function buildRadarChart(){
    const genres = GENRES.filter(g => g.id !== 'all').slice(0, 6);
    const cx = 100, cy = 100, r = 70;
    const points = genres.map((g, i) => {
      const angle = (Math.PI * 2 * i / genres.length) - Math.PI / 2;
      const stats = predictStats.genreStats[g.id] || { hit: 0, total: 1 };
      const rate = stats.total > 0 ? stats.hit / stats.total : 0;
      const dist = r * Math.max(0.15, rate);
      return { x: cx + Math.cos(angle) * dist, y: cy + Math.sin(angle) * dist, label: g.ja };
    });
    const poly = points.map(p => `${p.x},${p.y}`).join(' ');
    const axes = genres.map((g, i) => {
      const angle = (Math.PI * 2 * i / genres.length) - Math.PI / 2;
      const x2 = cx + Math.cos(angle) * r;
      const y2 = cy + Math.sin(angle) * r;
      const lx = cx + Math.cos(angle) * (r + 16);
      const ly = cy + Math.sin(angle) * (r + 16);
      return `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="rgba(245,243,238,0.12)" stroke-width="1"/>
        <text x="${lx}" y="${ly}" fill="var(--text-dim)" font-size="7" text-anchor="middle">${g.ja}</text>`;
    }).join('');
    return `<svg class="radar-chart" viewBox="0 0 200 200">${axes}
      <polygon points="${poly}" fill="rgba(212,255,61,0.2)" stroke="var(--spike)" stroke-width="1.5"/>
    </svg>`;
  }

  function buildHeatmap(){
    const grid = new Array(24).fill(0);
    const displayable = allVideos.filter(v => !v.predictionOnly);
    displayable.forEach(v => {
      const h = new Date(v.publishedAt).getHours();
      grid[h] += v.growthRatio || 1;
    });
    const max = Math.max(...grid, 1);
    const cells = grid.map((v, i) => {
      const intensity = v / max;
      const color = intensity > 0.6 ? 'var(--hot)' : intensity > 0.3 ? 'var(--spike)' : 'rgba(245,243,238,0.06)';
      return `<div class="heatmap-cell" style="background:${color}" title="${i}時"></div>`;
    }).join('');
    return `<div class="heatmap-labels"><span>0時</span><span>6時</span><span>12時</span><span>18時</span><span>23時</span></div><div class="heatmap">${cells}</div>`;
  }

  function buildDurationInsight(){
    const durations = allVideos.filter(v => v.durationSeconds).map(v => v.durationSeconds);
    if(!durations.length) return '';
    const buckets = { '15-30秒': 0, '30-45秒': 0, '45-60秒': 0 };
    durations.forEach(d => {
      if(d < 30) buckets['15-30秒'] += 1;
      else if(d < 45) buckets['30-45秒'] += 1;
      else buckets['45-60秒'] += 1;
    });
    const best = Object.entries(buckets).sort((a, b) => b[1] - a[1])[0][0];
    return t('durationInsight', best);
  }

  function buildAudioTrends(){
    const counts = {};
    allVideos.forEach(v => {
      const hint = v.audioHint || '不明音源';
      counts[hint] = (counts[hint] || 0) + 1;
    });
    return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 5)
      .map(([name, n]) => `${name} (${n})`).join('<br>');
  }

  // ---- spike meter bars -----------------------------------------
  function spikeMeterHTML(ratio, isHero){
    const bars = 5;
    let html = `<div class="spike-meter${isHero ? ' hot' : ''}">`;
    for(let i = 0; i < bars; i++){
      // 比率が高いほど速いパルス。少しランダムにずらして「生きてる」感を出す
      const speed = Math.max(0.45, 1.6 - (ratio / 60) - i * 0.07);
      const delay = (i * 0.08).toFixed(2);
      html += `<div class="bar" style="animation-duration:${speed.toFixed(2)}s; animation-delay:-${delay}s;"></div>`;
    }
    html += `</div>`;
    return html;
  }

      </div>
    `;

    card.querySelector('.overlay-main').appendChild(buildPredictBlock(video));

    if(currentGenre === 'clips'){
      const memo = document.createElement('textarea');
      memo.className = 'clip-memo';
      memo.placeholder = '編集技術メモ...';
      memo.value = clipMemos[video.id] || '';
      memo.addEventListener('click', e => e.stopPropagation());
      memo.addEventListener('input', () => {
        clipMemos[video.id] = memo.value;
        saveClipMemos();
      });
      card.querySelector('.overlay-main').appendChild(memo);
    }

    card.querySelector('.sound-toggle').addEventListener('click', (e) => {
      e.stopPropagation();
      MUTED = !MUTED;
      localStorage.setItem('buzzshorts_muted', MUTED);
      card.querySelector('.sound-toggle').innerHTML = soundIcon();
      if(activePlayer && activeCardId === video.id){
        MUTED ? activePlayer.mute() : activePlayer.unMute();
      }
    });

    card.querySelector('.clip-toggle').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleClip(video);
      const btn = card.querySelector('.clip-toggle');
      const nowClipped = isClipped(video.id);
      btn.classList.toggle('active', nowClipped);
      btn.innerHTML = clipIcon(nowClipped);
    });

    return card;
  }

  function soundIcon(){
    return MUTED
      ? `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12A4.5 4.5 0 0 0 14 8v8a4.5 4.5 0 0 0 2.5-4Z"/><path d="M3 9v6h4l5 5V4L7 9H3Z"/><path d="M19.5 4.5l-15 15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3Z"/><path d="M16.5 12A4.5 4.5 0 0 0 14 8v8a4.5 4.5 0 0 0 2.5-4Z"/><path d="M19 5a8 8 0 0 1 0 14" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>`;
  }

  function clipIcon(active){
    return active
      ? `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 2.5h12a1 1 0 0 1 1 1V21l-7-4.5L5 21V3.5a1 1 0 0 1 1-1Z"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2.5h12a1 1 0 0 1 1 1V21l-7-4.5L5 21V3.5a1 1 0 0 1 1-1Z" stroke-linejoin="round"/></svg>`;
  }

  function escapeHTML(s){
    const div = document.createElement('div');
    div.textContent = s ?? '';
    return div.innerHTML;
  }

  // ---- feed rendering -----------------------------------------
  function renderFeed(){
    feedEl.innerHTML = '';

    if(currentGenre === 'predict'){
      emptyStatus.classList.add('hidden');
      const card = document.createElement('section');
      card.className = 'card';
      card.appendChild(buildPredictDashCard());
      feedEl.appendChild(card);
      feedEl.scrollTop = 0;
      return;
    }

    let list;
    let allowHero = false;

    // predictionOnly: 答え合わせ待ちのために裏で保持しているだけの動画。
    // 表示枠から間引かれた動画なので、通常のフィードには出さない。
    // sourceLang: 動画のタイトル言語。EN/JP切り替えタブに合わせて出す動画も切り替える
    //（sourceLangが無い古いデータはJP扱いにする）。
    const displayableVideos = allVideos.filter(v => !v.predictionOnly);

    if(currentGenre === 'clips'){
      list = clips.slice();
    } else if(currentGenre === 'myfeed'){
      list = displayableVideos.filter(v => favoriteGenres.includes(v.genre));
      allowHero = true;
    } else if(currentGenre === 'all'){
      list = displayableVideos.slice();
      allowHero = true;
    } else {
      list = displayableVideos.filter(v => v.genre === currentGenre);
    }

    if(undergroundFilter){
      list = list.filter(v => (v.subscriberCount || 0) <= 1000);
    }

    if(currentGenre !== 'clips'){
      if(sortMode === 'new'){
        list.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
      } else if(sortMode === 'views'){
        list.sort((a, b) => (b.viewCount || 0) - (a.viewCount || 0));
      } else {
        list.sort((a, b) => (b.growthRatio || 0) - (a.growthRatio || 0));
      }
    }

    if(list.length === 0){
      emptyLabel.textContent = currentGenre === 'clips' ? t('clipsEmpty') : t('empty');
      emptyStatus.classList.remove('hidden');
      return;
    }
    emptyStatus.classList.add('hidden');

    if(currentGenre === 'clips'){
      const exportBtn = document.createElement('button');
      exportBtn.className = 'export-btn';
      exportBtn.textContent = t('exportCsv');
      exportBtn.addEventListener('click', exportClipsCsv);
      const exportBetBtn = document.createElement('button');
      exportBetBtn.className = 'export-btn';
      exportBetBtn.textContent = '📥 予想履歴をCSVエクスポート';
      exportBetBtn.addEventListener('click', exportBetHistoryCsv);
      const exportCard = document.createElement('section');
      exportCard.className = 'card';
      exportCard.style.height = 'auto';
      exportCard.style.minHeight = '120px';
      exportCard.style.display = 'flex';
      exportCard.style.flexDirection = 'column';
      exportCard.style.gap = '10px';
      exportCard.style.padding = '20px';
      exportCard.appendChild(exportBtn);
      exportCard.appendChild(exportBetBtn);
      feedEl.appendChild(exportCard);
    }

    let mvpId = null;
    if(allowHero && sortMode === 'spike' && list.length > 0){
      const today = new Date().toDateString();
      const todayVideos = list.filter(v => new Date(v.publishedAt).toDateString() === today || new Date(v.firstSeenAt || v.publishedAt).toDateString() === today);
      const mvpPool = todayVideos.length ? todayVideos : list;
      mvpId = mvpPool.reduce((best, v) => (v.growthRatio||0) > (best.growthRatio||0) ? v : best, mvpPool[0]).id;
    }

    list.forEach((video, i) => {
      const isMvp = video.id === mvpId;
      const isHero = allowHero && sortMode === 'spike' && i === 0 && !isMvp;
      feedEl.appendChild(buildCard(video, isHero, isMvp));
    });

    feedEl.scrollTop = 0;
    setupObserver();
  }

  // ---- YouTube player control -----------------------------------
  function onYouTubeIframeAPIReady(){
    ytReady = true;
    if(pendingActivate){
      activateCard(pendingActivate);
      pendingActivate = null;
    }
  }
  window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

  function activateCard(card){
    if(!ytReady){ pendingActivate = card; return; }
    const videoId = card.dataset.videoId;
    if(activeCardId === videoId) return;
    deactivateCurrent();

    const media = card.querySelector('.media');
    const img = media.querySelector('img');
    const hint = media.querySelector('.play-hint');
    if(img) img.style.display = 'none';
    if(hint) hint.style.display = 'none';

    const holder = document.createElement('div');
    media.appendChild(holder);

    const playerVars = {
      autoplay:1, mute: MUTED ? 1 : 0,
      playsinline:1, controls:0, rel:0, modestbranding:1, disablekb:1
    };
    if(!autoplayChain){
      playerVars.loop = 1;
      playerVars.playlist = videoId; // loop:1には同じ動画IDのplaylistが必須
    }

    activePlayer = new YT.Player(holder, {
      videoId,
      playerVars,
      events:{
        onReady:(e) => {
          MUTED ? e.target.mute() : e.target.unMute();
          e.target.playVideo();
        },
        onStateChange:(e) => {
          if(e.data === YT.PlayerState.PLAYING){
            startProgressTimer(card, e.target);
          } else if(e.data === YT.PlayerState.ENDED){
            stopProgressTimer();
            if(autoplayChain){
              goToNextCard(card);
            }
          } else {
            stopProgressTimer();
          }
        }
      }
    });
    activeCardId = videoId;

    // controlsを消した分、動画部分タップで再生/一時停止できるようにする
    holder.style.pointerEvents = 'none'; // iframe自体はタップを奪わない
    const tapLayer = media.querySelector('.tap-layer');
    if(tapLayer) tapLayer.onclick = () => {
      if(!activePlayer) return;
      const state = activePlayer.getPlayerState();
      if(state === YT.PlayerState.PLAYING) activePlayer.pauseVideo();
      else activePlayer.playVideo();
    };
  }

  function startProgressTimer(card, player){
    stopProgressTimer();
    const fill = card.querySelector('.autoplay-progress .fill');
    const videoId = card.dataset.videoId;
    if(!fill) return;
    watchVideoId = videoId;
    watchStartTime = Date.now();
    progressTimer = setInterval(() => {
      try{
        const duration = player.getDuration();
        const current = player.getCurrentTime();
        if(duration > 0){
          fill.style.width = Math.min(100, (current / duration) * 100) + '%';
        }
        if(getPoints() === 0 && !predictions[videoId]){
          const watched = Math.floor(current);
          if(watched >= BANKRUPTCY_WATCH_SEC){
            trackBankruptcyWatch(videoId, watched);
          }
        }
      }catch(err){}
    }, 200);
  }

  function stopProgressTimer(){
    if(progressTimer){
      clearInterval(progressTimer);
      progressTimer = null;
    }
  }

  function goToNextCard(card){
    const next = card.nextElementSibling;
    if(next){
      next.scrollIntoView({behavior:'smooth', block:'start'});
    }
  }

  function deactivateCurrent(){
    if(!activePlayer) return;
    stopProgressTimer();
    try{ activePlayer.destroy(); }catch(err){}
    activePlayer = null;

    if(activeCardId){
      const card = feedEl.querySelector(`.card[data-video-id="${activeCardId}"]`);
      if(card){
        const media = card.querySelector('.media');
        const img = media.querySelector('img');
        const hint = media.querySelector('.play-hint');
        const holder = media.querySelector('div:not(.play-hint)');
        const fill = card.querySelector('.autoplay-progress .fill');
        if(holder) holder.remove();
        if(img) img.style.display = '';
        if(hint) hint.style.display = '';
        if(fill) fill.style.width = '0%';
      }
    }
    activeCardId = null;
  }

  let observer = null;
  function setupObserver(){
    if(observer) observer.disconnect();
    observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting && entry.intersectionRatio > 0.6){
          activateCard(entry.target);
        }
      });
    }, {root: feedEl, threshold: [0.6]});

    feedEl.querySelectorAll('.card').forEach(card => observer.observe(card));
  }

  // ---- predict dash export button ----
  function buildPredictDashButton(){
    const btn = document.createElement('button');
    btn.className = 'export-btn';
    btn.textContent = '📥 予想統計をCSVエクスポート';
    btn.addEventListener('click', exportBetHistoryCsv);
    return btn;
  }

  // ---- 並び替え ------------------------------------------------
  sortBtn.addEventListener('click', () => {
    const idx = SORT_MODES.indexOf(sortMode);
    sortMode = SORT_MODES[(idx + 1) % SORT_MODES.length];
    localStorage.setItem('buzzshorts_sort', sortMode);
    applySortBtnLabel();
    showToast(t('sortNames')[sortMode]);
    renderFeed();
  });

  function applySortBtnLabel(){
    sortBtn.innerHTML = SORT_ICON[sortMode];
    sortBtn.title = t('sortNames')[sortMode];
  }

  // ---- 自動送り --------------------------------------------------
  autoplayBtn.addEventListener('click', () => {
    autoplayChain = !autoplayChain;
    localStorage.setItem('buzzshorts_autoplay', autoplayChain);
    applyAutoplayBtnLabel();
    showToast(autoplayChain ? t('autoplayOn') : t('researchOn'));
    if(activeCardId){
      const card = feedEl.querySelector(`.card[data-video-id="${activeCardId}"]`);
      if(card) activateCard(card);
    }
  });

  function applyAutoplayBtnLabel(){
    autoplayBtn.classList.toggle('autoplay-on', autoplayChain);
    autoplayBtn.classList.toggle('research-on', !autoplayChain);
    autoplayBtn.textContent = autoplayChain ? '▶▶' : '🔬';
  }

  undergroundBtn.addEventListener('click', () => {
    undergroundFilter = !undergroundFilter;
    localStorage.setItem('buzzshorts_underground', undergroundFilter);
    undergroundBtn.classList.toggle('filter-on', undergroundFilter);
    showToast(undergroundFilter ? t('undergroundOn') : t('undergroundOff'));
    renderFeed();
  });

  // ---- ジャンル設定モーダル ---------------------------------------
  function openGenreModal(){
    modalPillSelection = new Set(favoriteGenres);
    renderModalPills();
    renderThemePicker();
    applyModalLangUI();
    genreModal.classList.remove('hidden');
  }
  function renderThemePicker(){
    themePickerEl.innerHTML = '';
    Object.entries(THEMES).forEach(([id, theme]) => {
      const swatch = document.createElement('div');
      swatch.className = 'theme-swatch' + (currentTheme === id ? ' active' : '');
      swatch.style.background = `linear-gradient(135deg, ${theme.spike}, ${theme.hot})`;
      swatch.title = theme.label;
      swatch.addEventListener('click', () => {
        applyTheme(id);
        themePickerEl.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
      });
      themePickerEl.appendChild(swatch);
    });
  }
  function closeGenreModal(){
    genreModal.classList.add('hidden');
  }
  function renderModalPills(){
    modalPillsEl.innerHTML = '';
    GENRES.filter(g => g.id !== 'all').forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'pill-choice' + (modalPillSelection.has(g.id) ? ' selected' : '');
      btn.textContent = g[LANG];
      btn.addEventListener('click', () => {
        if(modalPillSelection.has(g.id)) modalPillSelection.delete(g.id);
        else modalPillSelection.add(g.id);
        btn.classList.toggle('selected');
      });
      modalPillsEl.appendChild(btn);
    });
  }
  function applyModalLangUI(){
    modalTitleEl.textContent = t('modalTitle');
    modalDescEl.textContent = t('modalDesc');
    modalSaveBtn.textContent = t('modalSave');
    modalSkipBtn.textContent = t('modalSkip');
  }

  settingsBtn.addEventListener('click', openGenreModal);
  modalSkipBtn.addEventListener('click', closeGenreModal);
  modalSaveBtn.addEventListener('click', () => {
    favoriteGenres = [...modalPillSelection];
    localStorage.setItem('buzzshorts_favorites', JSON.stringify(favoriteGenres));
    localStorage.setItem('buzzshorts_onboarded', 'true');
    closeGenreModal();
    if(favoriteGenres.length > 0){
      currentGenre = 'myfeed';
    }
    renderTabs();
    renderFeed();
  });

  // ---- language toggle ------------------------------------------
  langBtn.addEventListener('click', () => {
    LANG = LANG === 'ja' ? 'en' : 'ja';
    localStorage.setItem('buzzshorts_lang', LANG);
    // 切り替え後に今のジャンルタブがEN/JPどちらにも存在しない場合は「すべて」に戻す
    const specialTabs = ['all', 'myfeed', 'clips', 'predict'];
    if(!specialTabs.includes(currentGenre)){
      const stillPresent = allVideos.some(v => v.genre === currentGenre && (v.sourceLang || 'ja') === LANG);
      if(!stillPresent) currentGenre = 'all';
    }
    applyLangUI();
    renderTabs();
    renderFeed();
  });

  function applyLangUI(){
    document.documentElement.lang = LANG;
    if(langBtn) langBtn.textContent = I18N[LANG].langBtn;
    loadingLabel.textContent = t('loading').toUpperCase();
    applySortBtnLabel();
    applyAutoplayBtnLabel();
    updatePointsUI();
    undergroundBtn.classList.toggle('filter-on', undergroundFilter);
    if(!genreModal.classList.contains('hidden')) applyModalLangUI();
  }

  async function init(){
    applyTheme(currentTheme);
    applyLangUI();
    checkSeasonReset();
    updateStreak();
    // 初回起動時は初期ポイントをセット
    if(localStorage.getItem('buzzshorts_points') === null){
      setPoints(INITIAL_POINTS);
    }
    grantDailyBonus();
    updatePointsUI();
    checkBankruptcy();

    try{
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);
      const res = await fetch('data/shorts.json', {cache:'no-store', signal: controller.signal}).finally(() => clearTimeout(timeout));
      if(!res.ok) throw new Error('fetch failed: ' + res.status);
      const json = await res.json();
      if(!Array.isArray(json.videos)) throw new Error('invalid format');
      allVideos = json.videos || [];
      if(allVideos.length === 0) throw new Error('no videos');
      if(json.generatedAt){
        const d = new Date(json.generatedAt);
        updatedAtEl.textContent = t('updated', d.toLocaleString(LANG === 'ja' ? 'ja-JP' : 'en-US', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}));
      }
    }catch(err){
      console.error('Data fetch failed:', err.message);
      allVideos = [];
      showToast('データ読みこみに失敗しました');
    }
    checkResolutions();
    loadingStatus.classList.add('hidden');
    renderTabs();
    renderFeed();

    if(!localStorage.getItem('buzzshorts_onboarded')){
      setTimeout(openGenreModal, 500);
    }

    setInterval(() => {
      let pending = 0;
      Object.entries(predictions).forEach(([id, p]) => {
        if(!p.judged) pending++;
      });
      updateAppBadge(pending);
    }, 60000);
  }

  init();

  // ---- PWA: サービスワーカー登録 -----------------------------------
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
  </script>
  <script data-goatcounter="https://buzzshorts.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
