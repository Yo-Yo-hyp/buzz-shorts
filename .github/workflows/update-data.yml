name: Update Shorts Data

# 1日4回（6時間ごと）データを更新する
# YouTube Data APIの無料枠（1日10,000ユニット）に収まる範囲
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}  # 手動実行用ボタンも有効化

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest Shorts data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          LOOKBACK_HOURS: '24'
          MAX_PER_GENRE: '15'
        run: node fetch-shorts.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "buzz-shorts-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/shorts.json
          git diff --staged --quiet || git commit -m "chore: update shorts data"
          git push
